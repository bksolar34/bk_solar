// ---- Real geocoding via OpenStreetMap Nominatim (free, no API key) ----
// Switched from Open-Meteo's geocoder to Nominatim because Open-Meteo's
// geocoding API matches place/city names well but often fails on full
// street addresses (building numbers, 동/읍/리 level detail) -- exactly
// the kind of address most users type in here. Nominatim is built for
// full-address search and is what "OpenStreetMap 연동" in the spec
// refers to. Elevation isn't part of Nominatim's response, so that's a
// second, separate call to Open-Meteo's free elevation API.
// If a Google API key is configured (Store.getGoogleApiKey()), use
// Google's Geocoding API -- it handles some address formats (very new
// buildings, certain international formats) better than OSM data.
// Google Geocoding is NOT actually key-free (it needs a Google Cloud
// project + billing account, even though usage is covered by a monthly
// free credit), so it's an opt-in upgrade here, not the default: without
// a key configured, this app already geocodes anywhere in the world via
// OpenStreetMap's free Nominatim service below.
async function geocodeAddress(address) {
  const apiKey = Store.getGoogleApiKey();
  if (apiKey) {
    try {
      return await geocodeWithGoogle(address, apiKey);
    } catch (e) {
      console.warn("Google geocoding failed, falling back to OpenStreetMap:", e.message);
    }
  }
  return geocodeWithNominatim(address);
}

async function geocodeWithGoogle(address, apiKey) {
  const url = "https://maps.googleapis.com/maps/api/geocode/json?address=" + encodeURIComponent(address) + "&key=" + apiKey;
  const res = await fetch(url);
  if (!res.ok) throw new Error("Google geocoding request failed: " + res.status);
  const data = await res.json();
  if (data.status !== "OK" || !data.results[0]) throw new Error("Google geocoding: " + (data.status || "no results"));
  const hit = data.results[0];
  const { lat, lng } = hit.geometry.location;

  let elevation = 0;
  try {
    const elevRes = await fetch("https://maps.googleapis.com/maps/api/elevation/json?locations=" + lat + "," + lng + "&key=" + apiKey);
    if (elevRes.ok) {
      const elevData = await elevRes.json();
      elevation = elevData.results && elevData.results[0] ? elevData.results[0].elevation : 0;
    }
  } catch (e) {
    console.warn("Google elevation lookup failed, defaulting to 0:", e.message);
  }

  return { address, latitude: lat, longitude: lng, elevation, name: hit.formatted_address, source: "Google" };
}

// Default, key-free geocoder -- OpenStreetMap's Nominatim, which
// searches full street addresses worldwide (not just Korea), so this
// is what makes "주소 입력 -> 전세계 어디든 좌표 찾기" work with zero
// setup. Google above is purely an optional upgrade path.
async function geocodeWithNominatim(address) {
  const url =
    "https://nominatim.openstreetmap.org/search?format=jsonv2&addressdetails=1&limit=1&accept-language=ko&q=" +
    encodeURIComponent(address);
  const res = await fetch(url, { headers: { Accept: "application/json" } });
  if (!res.ok) throw new Error("geocoding request failed: " + res.status);
  const results = await res.json();
  const hit = results && results[0];
  if (!hit) throw new Error("주소를 찾을 수 없습니다 (더 구체적으로 입력해보세요, 예: '대전광역시 유성구')");

  const latitude = Number(hit.lat);
  const longitude = Number(hit.lon);
  let elevation = 0;
  try {
    const elevRes = await fetch("https://api.open-meteo.com/v1/elevation?latitude=" + latitude + "&longitude=" + longitude);
    if (elevRes.ok) {
      const elevData = await elevRes.json();
      elevation = elevData.elevation && elevData.elevation[0] != null ? elevData.elevation[0] : 0;
    }
  } catch (e) {
    console.warn("elevation lookup failed, defaulting to 0:", e.message);
  }

  return { address, latitude, longitude, elevation, name: hit.display_name, source: "OpenStreetMap" };
}

// Real current + hourly weather (temperature, wind, solar radiation) for
// the geocoded coordinates. shortwave_radiation (W/m^2) is what drives
// the "기상반 이론치" (on-site weather-station theoretical yield) below.
async function fetchWeather(lat, lon) {
  const url =
    "https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon +
    "&hourly=shortwave_radiation,temperature_2m,windspeed_10m,cloudcover" +
    "&current=temperature_2m,windspeed_10m,shortwave_radiation" +
    "&timezone=auto&forecast_days=2";
  const res = await fetch(url);
  if (!res.ok) throw new Error("weather request failed: " + res.status);
  return res.json();
}

// Best-effort long-term climatology baseline (spec: "NASA POWER API 연동
// ... 과거 10~30년 ... P50/P90 캘린더"). Wrapped in try/catch because
// NASA POWER's CORS support can't be verified from this sandbox --
// if the browser blocks it, we fall back to a flat placeholder rather
// than breaking the page.
async function fetchNasaBaseline(lat, lon) {
  try {
    const params = new URLSearchParams({
      parameters: "ALLSKY_SFC_SW_DWN",
      community: "RE",
      longitude: String(lon),
      latitude: String(lat),
      start: "2004",
      end: "2023",
      format: "JSON",
    });
    const res = await fetch("https://power.larc.nasa.gov/api/temporal/climatology/point?" + params);
    if (!res.ok) throw new Error("NASA POWER returned " + res.status);
    const data = await res.json();
    const monthly = data.properties.parameter.ALLSKY_SFC_SW_DWN; // { "01": v, ..., "13": annual avg }
    const month = new Date().getMonth() + 1;
    const key = String(month).padStart(2, "0");
    return { monthlyAvgKwhM2: monthly[key], source: "NASA POWER (2004-2023 평균)" };
  } catch (e) {
    console.warn("NASA POWER fetch failed, using placeholder:", e.message);
    return { monthlyAvgKwhM2: 4.5, source: "추정치 (NASA POWER 응답 실패)" };
  }
}

// ---- Real solar-position math (no API -- standard NOAA-style approximation) ----
// Returns sun altitude in degrees above the horizon for a given lat/lon
// and Date. Used for the shading-loss estimate below; this part is
// genuinely computed astronomy, not mocked.
function solarAltitudeDeg(lat, lon, date) {
  const rad = Math.PI / 180;
  const start = new Date(date.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((date - start) / 86400000);
  const decl = -23.45 * Math.cos(rad * (360 / 365) * (dayOfYear + 10));
  const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60;
  const solarTime = utcHours + lon / 15; // rough longitude-based correction
  const hourAngle = (solarTime - 12) * 15;
  const sinAlt =
    Math.sin(rad * lat) * Math.sin(rad * decl) +
    Math.cos(rad * lat) * Math.cos(rad * decl) * Math.cos(rad * hourAngle);
  return Math.asin(Math.max(-1, Math.min(1, sinAlt))) / rad;
}

// Real OpenStreetMap data rendered with MapLibre GL.
// "osm3d"는 OpenFreeMap(무료, API 키 불필요)이 제공하는 벡터 타일 +
// 표준 스타일(fill-extrusion 레이어 포함)을 그대로 사용하므로, 건물
// 하나하나가 실제 높이로 솟아오르는 진짜 3D 뷰가 된다 (이전 버전은
// 래스터 타일에 카메라만 기울인 "가짜 3D"였음). 여기에 더해 지형
// (산/경사)도 평평한 바닥이 아니라 실제 고도값 그대로 솟아오르도록,
// AWS Open Data Terrain Tiles(무료, API 키 불필요, Terrarium 인코딩
// PNG-DEM)를 raster-dem 소스로 추가하고 map.setTerrain()을 호출한다
// (건물은 OpenFreeMap의 fill-extrusion, 지형은 이 DEM -- 서로 다른
// 소스지만 MapLibre가 같은 3D 씬 안에 합성해서 보여준다). osm/cyclosm은
// 위성/지형 스타일이 필요할 때를 위한 2D 대안으로 남겨둔다.
const TERRAIN_DEM_SOURCE = {
  type: "raster-dem",
  tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
  tileSize: 256,
  maxzoom: 15,
  encoding: "terrarium",
  attribution: "Terrain: AWS Terrain Tiles (Mapzen)",
};

const MAP_LAYERS = {
  osm3d: {
    label: "3D 건물 · 지형 뷰 (OpenFreeMap)",
    styleUrl: "https://tiles.openfreemap.org/styles/liberty",
    is3d: true,
    terrain: true,
  },
  osm: {
    label: "표준 OSM (2D)",
    tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
    attribution: "\u00a9 OpenStreetMap contributors",
  },
  // CyclOSM renders contour-adjacent terrain/elevation styling more
  // prominently than the standard OSM style, which is why it's offered
  // here as the "enhanced" layer for shading/terrain analysis context.
  cyclosm: {
    label: "CyclOSM (지형 강조, 2D)",
    tiles: [
      "https://a.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
      "https://b.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
      "https://c.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png",
    ],
    attribution: "\u00a9 OpenStreetMap contributors, CyclOSM",
  },
};

function OsmMap3D({ latitude, longitude, layer }) {
  const mapRef = useRef(null);
  const containerRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || typeof maplibregl === "undefined") return;
    const layerDef = MAP_LAYERS[layer] || MAP_LAYERS.osm3d;
    // OpenFreeMap 벡터 스타일은 URL 문자열 그대로를 style로 넘기면
    // MapLibre가 fill-extrusion(건물)까지 포함된 완성된 스타일을 로드한다.
    // 래스터 레이어(osm/cyclosm)는 기존처럼 직접 style JSON을 구성한다.
    const styleOption = layerDef.styleUrl
      ? layerDef.styleUrl
      : {
          version: 8,
          sources: {
            base: {
              type: "raster",
              tiles: layerDef.tiles,
              tileSize: 256,
              attribution: layerDef.attribution,
            },
          },
          layers: [{ id: "base", type: "raster", source: "base" }],
        };
    const map = new maplibregl.Map({
      container: containerRef.current,
      style: styleOption,
      center: [longitude, latitude],
      zoom: layerDef.is3d ? 17 : 16,
      pitch: layerDef.is3d ? 60 : 55,
      bearing: -20,
      attributionControl: true,
    });
    map.addControl(new maplibregl.NavigationControl(), "top-right");
    new maplibregl.Marker({ color: "#2563eb" }).setLngLat([longitude, latitude]).addTo(map);
    // 건물뿐 아니라 지형(경사/고도)도 3D로 솟아오르게 하기 위한 DEM
    // terrain 연결. 스타일이 완전히 로드된 뒤(source 등록 가능해진 뒤)에
    // 실행해야 하므로 "load" 이벤트를 기다린다. 2D 래스터 레이어(osm/
    // cyclosm)에는 terrain을 걸지 않는다 (평면 지도 위의 지형 왜곡은
    // 오히려 지도를 읽기 어렵게 만들기 때문).
    if (layerDef.terrain) {
      map.on("load", () => {
        try {
          if (!map.getSource("terrainDem")) map.addSource("terrainDem", TERRAIN_DEM_SOURCE);
          map.setTerrain({ source: "terrainDem", exaggeration: 1.5 });

          // DEM만 걸면 지도가 울퉁불퉁해지긴 해도 표면 색은 기존 스타일
          // 배경색 그대로라 "여기가 지형이다"가 잘 안 보인다(건물과 색이
          // 비슷해 구분 불가 문제). 지형에 음영(hillshade)을 입혀 표고
          // 변화 자체가 눈에 보이는 질감으로 드러나게 한다.
          const firstLayerId = map.getStyle().layers?.[0]?.id;
          if (!map.getLayer("terrain-hillshade")) {
            map.addLayer(
              {
                id: "terrain-hillshade",
                type: "hillshade",
                source: "terrainDem",
                paint: {
                  "hillshade-exaggeration": 0.9,
                  "hillshade-shadow-color": "#5c4a33",
                  "hillshade-highlight-color": "#ffffff",
                  "hillshade-accent-color": "#8a9a5b",
                },
              },
              firstLayerId
            );
          }

          // 건물(fill-extrusion) 레이어는 지형과 뚜렷이 구분되는 색으로
          // 강조한다. OpenFreeMap 'liberty' 스타일의 실제 레이어 id를
          // 하드코딩하지 않고 type으로 찾아서, 스타일 버전이 바뀌어도
          // 안전하게 동작하도록 했다.
          (map.getStyle().layers || []).forEach((l) => {
            if (l.type === "fill-extrusion") {
              try {
                map.setPaintProperty(l.id, "fill-extrusion-color", "#c9564f");
                map.setPaintProperty(l.id, "fill-extrusion-opacity", 0.95);
              } catch (e2) { /* 표현식으로 고정된 일부 레이어는 무시 */ }
            }
          });

          // 하늘/대기 레이어를 추가하면 지형 고저차가 실루엣만으로도
          // 눈에 훨씬 잘 들어온다 (그림자/일조 분석 화면과 연결되는
          // 맥락이므로 태양광 부지 경사도를 직관적으로 보여주는 데 도움).
          if (typeof map.setSky === "function") {
            map.setSky({ "sky-color": "#87ceeb", "sky-horizon-blend": 0.5, "horizon-color": "#ffffff", "horizon-fog-blend": 0.5, "fog-color": "#e9edf3", "fog-ground-blend": 0.5 });
          }
        } catch (e) {
          console.warn("지형(DEM) 레이어 연결 실패 - 건물만 3D로 표시됩니다:", e.message);
        }
      });
    }
    mapRef.current = map;
    return () => map.remove();
  }, [latitude, longitude, layer]);

  return <div ref={containerRef} style={{ width: "100%", height: "100%" }} />;
}

// 장애물 고도각(추상적인 도(°) 숫자)을 사람이 바로 이해할 수 있는
// 표현으로 변환한다 -- "3D 지형 및 음영 분석이 뭔 소리인지 모르겠다"는
// 피드백에 대한 대응으로, 숫자 하나도 그냥 두지 않고 말로 풀어준다.
function obstructionDescription(angle) {
  if (angle <= 5) return "거의 없음 (탁 트인 부지)";
  if (angle <= 15) return "낮은 담장/나무 수준";
  if (angle <= 25) return "저층 건물 수준";
  if (angle <= 40) return "고층 건물/언덕 수준";
  return "매우 높은 산/고층 빌딩 수준";
}

function GeospatialPage() {
  const savedLocation = Store.getLocation();
  const [address, setAddress] = useState(savedLocation?.address ?? "");
  const [location, setLocationState] = useState(savedLocation);
  const [weather, setWeather] = useState(null);
  const [obstruction, setObstruction] = useState(Store.getObstructionAngle());
  const [status, setStatus] = useState("");
  const [mapLayer, setMapLayer] = useState("osm3d");
  const [googleApiKey, setGoogleApiKeyState] = useState(Store.getGoogleApiKey());
  const [showApiKeyField, setShowApiKeyField] = useState(false);

  // ---- 손실률 계산 프레임워크 입력값 (요청: 종단/횡단 분석, 지형 경사,
  // 어레이 간 이격거리에 따른 발전량 수정, 설비 높이, 하단부 경작 여부) ----
  const [analysisAxis, setAnalysisAxis] = useState("longitudinal"); // "longitudinal"(종단, 전후열) | "transverse"(횡단, 좌우열)
  const [slopeDir, setSlopeDir] = useState("flat"); // "flat" | "south" | "north" -- 부지가 남향/북향 경사인지
  const [slopeDeg, setSlopeDeg] = useState(0); // 경사도(°)
  const [rowPitchM, setRowPitchM] = useState(4); // 전후(종단) 이격거리 -- 앞줄이 뒷줄을 가리는 정도에 영향
  const [colPitchM, setColPitchM] = useState(1); // 좌우(횡단) 이격거리 -- 옆 어레이가 가리는 정도에 영향
  const [structureHeightM, setStructureHeightM] = useState(1.5); // 발전설비(어레이 하단) 지상고
  const [underPanelUse, setUnderPanelUse] = useState("none"); // "none" | "crop"(영농형) | "livestock"(방목형)
  const [agriTransmitPct, setAgriTransmitPct] = useState(10); // 영농형일 때 작물에 나눠주는 광투과 비율(%)

  useEffect(() => {
    if (location) loadWeather(location.latitude, location.longitude);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  async function loadWeather(lat, lon) {
    try {
      setStatus("기상 정보 불러오는 중...");
      const w = await fetchWeather(lat, lon);
      setWeather(w);
      setStatus("");
    } catch (e) {
      setStatus("기상 정보를 불러오지 못했습니다: " + e.message);
    }
  }

  async function handleGeocode() {
    if (!address.trim()) return;
    setStatus("주소 조회 중...");
    try {
      const loc = await geocodeAddress(address.trim());
      Store.setLocation(loc);
      setLocationState(loc);
      setStatus("");
      loadWeather(loc.latitude, loc.longitude);
    } catch (e) {
      setStatus("주소를 찾지 못했습니다: " + e.message + " (예: '대전광역시', '서울특별시 강남구'처럼 입력해보세요)");
    }
  }

  function handleObstructionChange(v) {
    const n = Number(v);
    setObstruction(n);
    Store.setObstructionAngle(n);
  }

  function handleGoogleApiKeyChange(v) {
    setGoogleApiKeyState(v);
    Store.setGoogleApiKey(v);
  }

  // Real solar-position math across today's daylight hours, compared
  // against the user-entered obstruction angle. Full 3D terrain/LIDAR
  // shading analysis (as the spec describes with OpenStreetMap terrain)
  // isn't feasible without a GIS backend, so the obstruction angle is a
  // manual stand-in for "how high do surrounding buildings/hills sit on
  // the horizon" -- everything downstream of that input is real math.
  const shading = useMemo(() => {
    if (!location) return null;
    const today = new Date();
    const hours = [];
    for (let h = 5; h <= 20; h++) {
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate(), h, 0, 0);
      hours.push({ hour: h, altitude: solarAltitudeDeg(location.latitude, location.longitude, d) });
    }
    const daylight = hours.filter((r) => r.altitude > 0);
    const shaded = daylight.filter((r) => r.altitude < obstruction);
    const lossPct = daylight.length ? (shaded.length / daylight.length) * 100 : 0;
    return { hours, lossPct, daylightHours: daylight.length, blockedHours: shaded.length };
  }, [location, obstruction]);

  // ---- 손실률 계산 프레임워크 --------------------------------------------
  // 지형 경사, 자전축에 의한 태양 입사각(연중 변화, solarAltitudeDeg가 이미
  // 반영), 기상자료 구름에 의한 그림자(6시간 단위), 어레이 간 이격거리에
  // 따른 자기 그림자(종단/횡단), 하단부 영농형 구성까지 종합해 발전량
  // 손실률을 산출하는 틀이다. 실제 LIDAR/BIM 기반 정밀 음영 시뮬레이션과
  // 달리, 각 요인을 단순화한 물리 근사식으로 계산한 뒤 합산하는 "추정
  // 프레임워크"임을 명시한다 (요청 3번: "손실률을 계산할 수 있는 틀").
  const lossBreakdown = useMemo(() => {
    if (!location) return null;

    // 1) 지평선 장애물 손실 -- 지형이 남향 경사면 지평선이 더 낮아 보여
    //    장애물 각이 실질적으로 줄고, 북향 경사면 반대로 늘어난다.
    const slopeAdjust = slopeDir === "south" ? -slopeDeg : slopeDir === "north" ? slopeDeg : 0;
    const effectiveObstruction = Math.max(0, obstruction + slopeAdjust);
    const today = new Date();
    const hours = [];
    for (let h = 5; h <= 20; h++) {
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate(), h, 0, 0);
      hours.push({ hour: h, altitude: solarAltitudeDeg(location.latitude, location.longitude, d) });
    }
    const daylight = hours.filter((r) => r.altitude > 0);
    const horizonBlocked = daylight.filter((r) => r.altitude < effectiveObstruction);
    const horizonLossPct = daylight.length ? (horizonBlocked.length / daylight.length) * 100 : 0;

    // 2) 어레이 자기 그림자(self-shading) -- 종단(전후열)은 rowPitch,
    //    횡단(좌우열)은 colPitch를 쓴다. 앞 어레이(또는 옆 어레이)가
    //    설비 높이(structureHeightM)만큼 시야를 가리는 임계 고도각을
    //    atan(높이/이격거리)로 근사하고, 그 각도보다 태양이 낮은
    //    시간대를 "자기 그림자에 의한 손실"로 계산한다.
    const pitch = analysisAxis === "longitudinal" ? rowPitchM : colPitchM;
    const criticalAngleDeg = pitch > 0 ? (Math.atan(structureHeightM / pitch) * 180) / Math.PI : 0;
    const selfShadedHours = daylight.filter((r) => r.altitude < criticalAngleDeg + effectiveObstruction);
    const selfShadingLossPct = daylight.length ? (selfShadedHours.length / daylight.length) * 100 : 0;

    // 3) 구름에 의한 손실 (기상자료, 6시간 단위: 00/06/12/18시) --
    //    Open-Meteo 시간별 cloudcover(%)를 6시간 간격으로 샘플링해
    //    평균을 낸 뒤, 대략적인 일사량 감쇠 계수(0.75)를 곱한다 --
    //    구름량(%)과 일사 손실(%)이 1:1은 아니지만 실무적으로 널리
    //    쓰이는 근사치다.
    let cloudLossPct = 0;
    let cloudSamples = [];
    if (weather && weather.hourly && weather.hourly.time && weather.hourly.cloudcover) {
      const todayStr = today.toISOString().slice(0, 10);
      const targetHours = [0, 6, 12, 18];
      cloudSamples = weather.hourly.time
        .map((t, i) => ({ t: new Date(t), cover: weather.hourly.cloudcover[i] }))
        .filter((r) => r.t.toISOString().slice(0, 10) === todayStr && targetHours.includes(r.t.getHours()));
      if (cloudSamples.length) {
        const avgCloud = cloudSamples.reduce((a, r) => a + (r.cover ?? 0), 0) / cloudSamples.length;
        cloudLossPct = avgCloud * 0.75;
      }
    }

    // 4) 하단부 영농형(경작) 구성 -- 작물에 빛을 나눠주도록 설계된
    //    구조라면 그만큼 발전 손실이 발생한다. 방목형/미사용은 광학적
    //    손실이 없다(설비 높이 규정만 별도 확인 필요).
    const agriLossPct = underPanelUse === "crop" ? agriTransmitPct : 0;

    const totalLossPct = Math.min(95, horizonLossPct + selfShadingLossPct + cloudLossPct + agriLossPct);

    // 시각화용: 오늘 태양 남중고도(정오 근처 최고 고도) -- 임계각과 비교해
    // "지금 이 이격거리/높이 조합이면 정오에도 그림자에 걸리는지"를
    // 다이어그램에서 바로 보여주기 위함.
    const noonSample = hours.reduce((best, r) => (r.altitude > (best?.altitude ?? -999) ? r : best), null);
    const noonAltitudeDeg = noonSample ? noonSample.altitude : 0;

    return {
      effectiveObstruction,
      horizonLossPct,
      criticalAngleDeg,
      selfShadingLossPct,
      cloudLossPct,
      cloudSampleCount: cloudSamples.length,
      agriLossPct,
      totalLossPct,
      noonAltitudeDeg,
      pitchUsed: pitch,
    };
  }, [location, obstruction, slopeDir, slopeDeg, analysisAxis, rowPitchM, colPitchM, structureHeightM, underPanelUse, agriTransmitPct, weather]);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Panel title="공간 정보 연동 및 부지 생성" eyebrow="GEOSPATIAL SETUP">
        <div className="geo-form">
          <input className="geo-input mono" placeholder="주소 입력 (예: 대전광역시 유성구, 또는 전세계 어디든)" value={address} onChange={(e) => setAddress(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleGeocode()} />
          <button className="geo-btn" onClick={handleGeocode}>위경도 조회</button>
        </div>
        <button className="google-key-toggle mono" onClick={() => setShowApiKeyField((v) => !v)}>
          {showApiKeyField ? "\u25be" : "\u25b8"} Google API 키 설정 (선택사항 - 기본값은 OpenStreetMap, 키 없이 전세계 검색 가능)
        </button>
        {showApiKeyField && (
          <div className="google-key-row">
            <input
              className="geo-input mono"
              type="password"
              placeholder="Google Geocoding API 키 (선택 - 없으면 OpenStreetMap 사용)"
              value={googleApiKey}
              onChange={(e) => handleGoogleApiKeyChange(e.target.value)}
            />
            <span className="google-key-hint mono">{googleApiKey ? "Google API 사용 중" : "미설정 - OpenStreetMap(Nominatim) 사용 중"}</span>
          </div>
        )}
        {status && <div className="geo-status mono">{status}</div>}
        {location && (
          <div style={{ marginTop: 16 }}>
            <div className="geo-name mono">{location.name || location.address}</div>
            <ReadoutGrid
              items={[
                { label: "위도", value: location.latitude.toFixed(4), unit: "\u00b0" },
                { label: "경도", value: location.longitude.toFixed(4), unit: "\u00b0" },
                { label: "고도", value: Math.round(location.elevation), unit: "m" },
              ]}
            />
          </div>
        )}
        {weather && weather.current && (
          <div style={{ marginTop: 16 }}>
            <div className="geo-sub-title mono">현재 기상 정보 (Open-Meteo 실시간)</div>
            <ReadoutGrid
              items={[
                { label: "기온", value: weather.current.temperature_2m, unit: "\u00b0C" },
                { label: "풍속", value: weather.current.windspeed_10m, unit: "km/h" },
                { label: "일사량", value: weather.current.shortwave_radiation, unit: "W/m\u00b2" },
              ]}
            />
          </div>
        )}
        <style>{`
          .geo-form { display: flex; gap: 8px; }
          .geo-input { flex: 1; padding: 10px 12px; border: 1px solid var(--hairline); border-radius: var(--radius); font-size: 15px; background: var(--panel); color: var(--text); }
          .geo-btn { padding: 10px 16px; border: 1px solid var(--phosphor); background: var(--phosphor); color: #fff; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
          .google-key-toggle { background: none; border: none; color: var(--text-faint); font-size: 13px; padding: 8px 0 0; cursor: pointer; text-align: left; }
          .google-key-toggle:hover { color: var(--text-muted); }
          .google-key-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; }
          .google-key-hint { font-size: 12px; color: var(--text-faint); white-space: nowrap; }
          .geo-status { margin-top: 10px; font-size: 14px; color: var(--text-faint); }
          .geo-name { font-size: 15px; color: var(--text); margin-bottom: 10px; }
          .geo-sub-title { font-size: 13px; color: var(--text-faint); margin-bottom: 8px; letter-spacing: 0.04em; }
        `}</style>
      </Panel>

      {location && (
        <Panel
          title="OpenStreetMap 3D 부지 뷰 (건물 + 지형)"
          eyebrow="실제 건물 높이 + 지형 고도(DEM)가 함께 반영된 3D 뷰 (드래그로 회전/기울기 조정)"
          action={
            <div style={{ display: "flex", gap: 6 }}>
              {Object.entries(MAP_LAYERS).map(([key, l]) => (
                <button key={key} className={"layer-btn mono" + (mapLayer === key ? " active" : "")} onClick={() => setMapLayer(key)}>
                  {l.label}
                </button>
              ))}
            </div>
          }
        >
          <div className="osm-map-wrap">
            <OsmMap3D latitude={location.latitude} longitude={location.longitude} layer={mapLayer} />
          </div>
          {mapLayer === "osm3d" && (
            <div className="map-legend mono">
              <span className="map-legend-item"><span className="map-legend-swatch building" /> 건물 (3D fill-extrusion, 실제 높이)</span>
              <span className="map-legend-item"><span className="map-legend-swatch terrain" /> 지형 (DEM 음영 · 표고 변화)</span>
            </div>
          )}
          <style>{`
            .osm-map-wrap { height: 360px; border-radius: var(--radius); overflow: hidden; }
            .layer-btn { padding: 6px 12px; border: 1px solid var(--hairline); background: var(--panel-raised); color: var(--text-muted); border-radius: var(--radius); font-size: 13px; cursor: pointer; }
            .layer-btn.active { border-color: var(--phosphor); color: var(--phosphor); font-weight: 700; }
            .map-legend { display: flex; gap: 18px; margin-top: 10px; font-size: 12px; color: var(--text-faint); flex-wrap: wrap; }
            .map-legend-item { display: flex; align-items: center; gap: 6px; }
            .map-legend-swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
            .map-legend-swatch.building { background: #c9564f; }
            .map-legend-swatch.terrain { background: linear-gradient(135deg, #8a9a5b, #5c4a33); }
          `}</style>
        </Panel>
      )}

      {location && (
        <Panel title="일조 시간 및 음영 영향 분석" eyebrow="오늘 기준 · 실제 위도/경도로 계산한 태양 고도">
          <p className="shade-intro mono">
            <T>아래 슬라이더로 "주변에 태양을 가리는 것이 얼마나 높이 있는지"를 설정하면,
            오늘 하루 중 언제 햇빛을 온전히 받고 언제 가려지는지를 타임라인으로 보여줍니다.</T>
          </p>
          <label className="obstruction-field mono">
            <span>주변 장애물 높이: <strong>{obstructionDescription(obstruction)}</strong></span>
            <input type="range" min="0" max="60" value={obstruction} onChange={(e) => handleObstructionChange(e.target.value)} />
            <span className="obstruction-value">{obstruction}\u00b0 (지평선 기준 각도)</span>
          </label>

          <div className="shade-legend mono">
            <span className="shade-legend-item"><span className="shade-dot normal" /> 정상 일사</span>
            <span className="shade-legend-item"><span className="shade-dot blocked" /> 장애물에 가려짐</span>
            <span className="shade-legend-item"><span className="shade-dot night" /> 야간(해 없음)</span>
          </div>

          <div className="shade-timeline">
            {shading.hours.map((r) => {
              const state = r.altitude <= 0 ? "night" : r.altitude < obstruction ? "blocked" : "normal";
              return (
                <div key={r.hour} className={"shade-seg " + state} title={r.hour + "시 · 태양 고도 " + r.altitude.toFixed(1) + "\u00b0"}>
                  <span className="shade-seg-hour mono">{r.hour}</span>
                </div>
              );
            })}
          </div>

          <div className="shade-summary mono">
            오늘 낮 시간 중 <strong style={{ color: "var(--text)" }}>{shading.daylightHours}시간</strong> 해가 떠 있고,
            그중 <strong style={{ color: "var(--alert)" }}>{shading.lossPct.toFixed(0)}%</strong>
            ({shading.blockedHours}시간)는 설정한 주변 장애물에 가려 발전량이 줄어들 것으로 예상됩니다.
          </div>

          <style>{`
            .shade-intro { font-size: 13px; color: var(--text-faint); margin: 0 0 16px; line-height: 1.6; }
            .obstruction-field { display: flex; flex-direction: column; gap: 6px; font-size: 14px; color: var(--text-faint); margin-bottom: 16px; }
            .obstruction-value { color: var(--text); font-size: 13px; }
            .shade-legend { display: flex; gap: 18px; margin-bottom: 10px; font-size: 12px; color: var(--text-faint); }
            .shade-legend-item { display: flex; align-items: center; gap: 6px; }
            .shade-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
            .shade-dot.normal { background: var(--warn); }
            .shade-dot.blocked { background: var(--alert); }
            .shade-dot.night { background: var(--hairline); }
            .shade-timeline { display: flex; gap: 2px; margin-bottom: 14px; }
            .shade-seg { flex: 1; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 4px; }
            .shade-seg.normal { background: var(--warn); }
            .shade-seg.blocked { background: var(--alert); }
            .shade-seg.night { background: var(--hairline); }
            .shade-seg-hour { font-size: 10px; color: rgba(0,0,0,0.55); }
            .shade-summary { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
          `}</style>
        </Panel>
      )}

      {location && lossBreakdown && (
        <Panel
          title="발전량 손실률 계산 (지형·이격거리·기상 종합)"
          eyebrow="종단/횡단 자기 그림자 + 지형 경사 + 구름(6시간 단위) + 영농형 구성을 종합한 추정 프레임워크"
        >
          <p className="shade-intro mono">
            <T>지평선 장애물뿐 아니라, 어레이 간 이격거리로 인한 자기 그림자(종단/횡단), 부지 경사도,
            기상자료의 구름량(6시간 단위), 하단부 영농형 구성 여부까지 반영해 손실률을 추정합니다.
            아래 값을 바꾸면 즉시 다시 계산됩니다.</T>
          </p>

          <div className="loss-axis-toggle mono">
            <button className={"loss-axis-btn" + (analysisAxis === "longitudinal" ? " active" : "")} onClick={() => setAnalysisAxis("longitudinal")}>
              종단 분석 (전후열 · Row Pitch)
            </button>
            <button className={"loss-axis-btn" + (analysisAxis === "transverse" ? " active" : "")} onClick={() => setAnalysisAxis("transverse")}>
              횡단 분석 (좌우열 · Column Pitch)
            </button>
          </div>

          {(() => {
            // 종단/횡단 자기 그림자 단면도 -- 이격거리(pitch)와 설비 높이가
            // 만드는 임계각(criticalAngleDeg)을 실제 각도 그대로 그려서,
            // "지금 이 간격이면 정오에도 그림자에 걸리는지"를 한눈에 보여준다.
            // (요청 4번: "종단분석과 횡단분석을 시각화하면 좋겠다")
            const pitch = Math.max(0.3, lossBreakdown.pitchUsed);
            const height = Math.max(0.2, structureHeightM);
            const W = 560, H = 220, groundY = 175, marginL = 60;
            // x/y 스케일을 동일하게 맞춰야 화면에 그려지는 각도가 실제
            // criticalAngleDeg와 시각적으로 일치한다.
            const maxExtent = Math.max(pitch * 1.4, height * 4);
            const scale = (W - marginL - 40) / maxExtent;
            const rowGap = pitch * scale;
            const barH = height * scale;
            const x1 = marginL, x2 = marginL + rowGap;
            const y1 = groundY - barH, y2 = groundY - barH;
            const shadowTipX = x1 + (groundY - y1) / Math.tan((lossBreakdown.criticalAngleDeg * Math.PI) / 180 || 0.0001);
            const noonRad = (Math.max(1, lossBreakdown.noonAltitudeDeg) * Math.PI) / 180;
            const noonShadowTipX = x1 + (groundY - y1) / Math.tan(noonRad);
            const isShadedAtNoon = lossBreakdown.noonAltitudeDeg < lossBreakdown.criticalAngleDeg;
            const axisLabel = analysisAxis === "longitudinal" ? "전후(종단) 이격거리" : "좌우(횡단) 이격거리";
            return (
              <div className="loss-svg-wrap">
                <svg viewBox={"0 0 " + W + " " + H} className="loss-svg">
                  <line x1="0" y1={groundY} x2={W} y2={groundY} stroke="var(--hairline)" strokeWidth="2" />
                  {/* 앞줄 어레이 */}
                  <rect x={x1 - 5} y={y1} width="10" height={barH} fill="#c9564f" rx="2" />
                  <text x={x1} y={groundY + 16} textAnchor="middle" fontSize="11" fill="var(--text-faint)">0m</text>
                  {/* 뒷줄(또는 옆줄) 어레이 */}
                  <rect x={x2 - 5} y={y2} width="10" height={barH} fill="#c9564f" rx="2" />
                  <text x={x2} y={groundY + 16} textAnchor="middle" fontSize="11" fill="var(--text-faint)">{pitch.toFixed(1)}m</text>
                  {/* 임계각(그림자가 딱 다음 열 밑에 닿는 각) 광선 */}
                  <line x1={x1} y1={y1} x2={Math.min(shadowTipX, W - 10)} y2={groundY} stroke="var(--warn)" strokeWidth="1.5" strokeDasharray="4 3" />
                  {/* 오늘 남중고도 광선 -- 실제로 지금 그림자가 어디까지 지는지 */}
                  <line x1={x1} y1={y1} x2={Math.min(Math.max(noonShadowTipX, x1), W - 10)} y2={groundY} stroke={isShadedAtNoon ? "var(--alert)" : "var(--success)"} strokeWidth="2" />
                  <text x={W - 8} y="16" textAnchor="end" fontSize="11" fill="var(--warn)">임계각 {lossBreakdown.criticalAngleDeg.toFixed(1)}\u00b0 (점선)</text>
                  <text x={W - 8} y="32" textAnchor="end" fontSize="11" fill={isShadedAtNoon ? "var(--alert)" : "var(--success)"}>
                    오늘 남중고도 {lossBreakdown.noonAltitudeDeg.toFixed(1)}\u00b0 -- {isShadedAtNoon ? "정오에도 그림자 걸림" : "정오엔 그림자 안 걸림"}
                  </text>
                  <text x={(x1 + x2) / 2} y={groundY + 34} textAnchor="middle" fontSize="12" fill="var(--text-muted)">{axisLabel}: {pitch.toFixed(1)}m · 설비 지상고: {height.toFixed(1)}m</text>
                </svg>
              </div>
            );
          })()}

          <div className="loss-input-grid">
            <label className="loss-field mono">
              <span>지형 경사 방향</span>
              <select value={slopeDir} onChange={(e) => setSlopeDir(e.target.value)}>
                <option value="flat">평지</option>
                <option value="south">남향 경사 (유리)</option>
                <option value="north">북향 경사 (불리)</option>
              </select>
            </label>
            <label className="loss-field mono">
              <span>경사도 (°)</span>
              <input type="number" min="0" max="45" value={slopeDeg} onChange={(e) => setSlopeDeg(Number(e.target.value) || 0)} />
            </label>
            <label className="loss-field mono">
              <span>전후(종단) 이격거리 (m)</span>
              <input type="number" min="0.5" step="0.1" value={rowPitchM} onChange={(e) => setRowPitchM(Number(e.target.value) || 0.1)} />
            </label>
            <label className="loss-field mono">
              <span>좌우(횡단) 이격거리 (m)</span>
              <input type="number" min="0.2" step="0.1" value={colPitchM} onChange={(e) => setColPitchM(Number(e.target.value) || 0.1)} />
            </label>
            <label className="loss-field mono">
              <span>발전설비 지상고 (m)</span>
              <input type="number" min="0.3" step="0.1" value={structureHeightM} onChange={(e) => setStructureHeightM(Number(e.target.value) || 0.1)} />
            </label>
            <label className="loss-field mono">
              <span>하단부 용도</span>
              <select value={underPanelUse} onChange={(e) => setUnderPanelUse(e.target.value)}>
                <option value="none">미사용 (일반형)</option>
                <option value="crop">영농형 (작물 재배)</option>
                <option value="livestock">방목형 (가축)</option>
              </select>
            </label>
            {underPanelUse === "crop" && (
              <label className="loss-field mono">
                <span>작물 광투과 비율 (%)</span>
                <input type="number" min="0" max="50" value={agriTransmitPct} onChange={(e) => setAgriTransmitPct(Number(e.target.value) || 0)} />
              </label>
            )}
          </div>

          <div className="loss-result-table mono">
            <div className="loss-result-row loss-result-head"><span>손실 요인</span><span>값</span></div>
            <div className="loss-result-row"><span>지평선 장애물 (지형 경사 반영, 유효 {lossBreakdown.effectiveObstruction.toFixed(1)}\u00b0)</span><span>{lossBreakdown.horizonLossPct.toFixed(1)}%</span></div>
            <div className="loss-result-row"><span>어레이 자기 그림자 ({analysisAxis === "longitudinal" ? "종단" : "횡단"}, 임계각 {lossBreakdown.criticalAngleDeg.toFixed(1)}\u00b0)</span><span>{lossBreakdown.selfShadingLossPct.toFixed(1)}%</span></div>
            <div className="loss-result-row"><span>구름(기상자료, 6시간 단위 {lossBreakdown.cloudSampleCount}건 평균)</span><span>{lossBreakdown.cloudLossPct.toFixed(1)}%</span></div>
            <div className="loss-result-row"><span>영농형 광투과 배분</span><span>{lossBreakdown.agriLossPct.toFixed(1)}%</span></div>
            <div className="loss-result-row loss-result-total"><span>추정 총 손실률</span><span>{lossBreakdown.totalLossPct.toFixed(1)}%</span></div>
          </div>
          <p className="mono" style={{ fontSize: 11, color: "var(--text-faint)", marginTop: 10, marginBottom: 0, lineHeight: 1.6 }}>
            \u26A0 각 요인은 단순화된 물리 근사식으로 계산되어 합산되는 추정치입니다(정밀 LIDAR/BIM 음영
            시뮬레이션 대체 아님). 실제 설계 시에는 정밀 실측 및 전문 시뮬레이션 툴로 검증하십시오.
          </p>

          <style>{`
            .loss-axis-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
            .loss-svg-wrap { background: var(--panel-raised); border: 1px solid var(--hairline); border-radius: var(--radius); padding: 10px; margin-bottom: 16px; }
            .loss-svg { width: 100%; height: auto; display: block; }
            .loss-axis-btn { flex: 1; padding: 10px 12px; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--panel-raised); color: var(--text-muted); font-size: 13px; cursor: pointer; }
            .loss-axis-btn.active { border-color: var(--phosphor); color: var(--phosphor); font-weight: 700; }
            .loss-input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 18px; }
            .loss-field { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text-faint); }
            .loss-field select, .loss-field input { padding: 7px 9px; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--panel); color: var(--text); font-size: 13px; }
            .loss-result-table { display: flex; flex-direction: column; gap: 2px; }
            .loss-result-row { display: grid; grid-template-columns: 1fr 90px; gap: 10px; padding: 7px 10px; font-size: 13px; border-bottom: 1px solid var(--hairline); }
            .loss-result-head { color: var(--text-faint); font-size: 11px; border-bottom: 2px solid var(--hairline); }
            .loss-result-total { font-weight: 700; color: var(--phosphor); border-top: 2px solid var(--hairline); border-bottom: none; margin-top: 4px; padding-top: 10px; }
          `}</style>
        </Panel>
      )}
    </div>
  );
}

/**
 * PowerPlantControlPage -- 발전소 원격 제어 (/control/plant)
 *
 * Dr. Bksolar 관리자 매뉴얼 23~26p의 화면을 그대로 구현한다:
 *   ① 발전소 메인 차단기 ON/OFF (전체 차단)
 *   ② 발전소 인버터 차단기 전체 ON/OFF
 *   ③ 인버터 개별 ON/OFF
 *   ④ 인버터별 원격 조건 제어 (유효전력%, 역률%, 주파수변경Hz)
 *   ⑤ 제어 결과 산출 (유효전력 제어 / 역률 제어 / 주파수 제어 3개 표)
 *
 * 요청 4번의 핵심: ⑤번 결과, 특히 [주파수 제어] 표의 "연계유지여부"는
 * 고정된 문서 수치가 아니라 window.ProtectionEngine(한전 계통연계
 * 기술기준 판정 엔진)을 실시간 호출한 결과이며 (js/remote-control-engine.js
 * 참고), 결과가 나올 때마다 Store.addControlLog로 구조화 기록을 남긴다.
 */
function PowerPlantControlPage({ usage }) {
  const [plant, setPlant] = useState(Store.getPlantControl());
  const [resultFor, setResultFor] = useState(null); // 결과창을 띄운 인버터 id
  // pendingAction: { type: "breaker", scope: "main"|"inverterAll"|inverterId, next: bool }
  //              | { type: "applySettings", inverterId }
  const [pendingAction, setPendingAction] = useState(null);
  const logs = Store.getControlLogs();
  const faultLogs = Store.getFaultActionLogs();
  const [justLoggedId, setJustLoggedId] = useState(null); // 방금 기록됨 표시(잠깐 하이라이트)

  // ---- 이벤트 반응형 고장(FAULT) 감지 --------------------------------
  // 이전 버전처럼 19개 코드를 항상 나열하지 않는다. 실제로 인버터에
  // 고장이 "발생했을 때만" 카드가 뜨는 이벤트 구동 방식으로 바꿨다
  // (요청 1/3번). 표준화된 js/inverter-fault-protocol.js를 통해
  // 제조사(vendor)와 무관하게 표준 코드로 해석한다 -- 이 발전소의
  // 인버터가 전부 이노일렉트릭(INO)이라고 가정한 데모용 발생 패턴이며,
  // 실제 배포 시에는 이 부분만 실제 인버터 통신에서 올라오는 원본
  // 코드로 교체하면 된다 (해석 로직/화면은 그대로 재사용됨).
  const tick = useRealtimeTick(3000);
  const activeFaults = useMemo(() => {
    const vendor = "INO";
    const rawCodes = window.FaultProtocol.rawCodesFor(vendor);
    if (!rawCodes.length) return [];
    const out = [];
    plant.inverters.forEach((inv, idx) => {
      // 인버터별로 위상을 다르게 줘서 여러 인버터에서 동시에 같은 고장이
      // 뜨지 않도록 하고, 대부분의 시간엔 고장이 없는 상태를 유지한다.
      const cycle = (tick + idx * 7) % 24;
      if (cycle !== 0) return; // 24틱(약 72초) 중 1틱만 활성 -- 이벤트성
      const rawCode = rawCodes[(tick + idx) % rawCodes.length];
      const fault = window.FaultProtocol.resolve(vendor, rawCode);
      if (fault) out.push({ ...fault, id: inv.id + "-" + rawCode + "-" + tick, inverterId: inv.id, inverterName: inv.name });
    });
    return out;
  }, [tick, plant.inverters]);

  // 출력제어(%)/역률(%)/주파수변경(Hz)은 입력하는 즉시 반영되지 않는다.
  // 매뉴얼상 실제 현장 제어 흐름과 동일하게, 입력은 "임시값(draft)"으로만
  // 남고 [적용] 버튼을 눌러 확인창까지 거쳐야 실제 인버터 설정
  // (plant.inverters, Store)에 반영된다.
  const [drafts, setDrafts] = useState(() =>
    Object.fromEntries(plant.inverters.map((i) => [i.id, { outputPct: i.outputPct, pfPct: i.pfPct, freqOffsetHz: i.freqOffsetHz }]))
  );

  function persistPlant(next) {
    setPlant(next);
    Store.setPlantControl(next);
  }

  function requestBreakerSwitch(scope, next) {
    setPendingAction({ type: "breaker", scope, next });
  }

  function requestApplySettings(inverterId) {
    setPendingAction({ type: "applySettings", inverterId });
  }

  function confirmPendingAction() {
    if (!pendingAction) return;
    if (pendingAction.type === "breaker") {
      const { scope, next } = pendingAction;
      if (scope === "main") {
        persistPlant({ ...plant, mainBreaker: next });
      } else if (scope === "inverterAll") {
        persistPlant({ ...plant, inverterBreaker: next });
      } else {
        persistPlant({ ...plant, inverters: plant.inverters.map((i) => (i.id === scope ? { ...i, on: next } : i)) });
      }
    } else if (pendingAction.type === "applySettings") {
      const { inverterId } = pendingAction;
      const draft = drafts[inverterId];
      persistPlant({ ...plant, inverters: plant.inverters.map((i) => (i.id === inverterId ? { ...i, ...draft } : i)) });
    }
    setPendingAction(null);
  }

  function updateDraft(id, field, value) {
    setDrafts((prev) => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
  }

  // 인버터별 개별 차단기 목록에서 인버터를 추가/제거한다. plant.inverters는
  // "인버터별 개별 차단기"와 "인버터 개별 제어" 두 패널이 같은 배열을
  // 공유해서 렌더링하므로, 여기서 한 번만 갱신해도 두 화면에 동시에
  // 반영된다 (요청: "개별차단기 및 개별제어에도 +,- 버튼... 연동").
  function addInverter() {
    const n = plant.inverters.length + 1;
    const newInv = {
      id: "inv-" + Date.now(), name: "INV-" + String(n).padStart(2, "0"),
      ratedKw: plant.inverters[0]?.ratedKw ?? 100, outputPct: 100, pfPct: 100, freqOffsetHz: 0, on: true,
    };
    const nextPlant = { ...plant, inverters: [...plant.inverters, newInv] };
    persistPlant(nextPlant);
    setDrafts((prev) => ({ ...prev, [newInv.id]: { outputPct: newInv.outputPct, pfPct: newInv.pfPct, freqOffsetHz: newInv.freqOffsetHz } }));
    setFaultLogInverterId((cur) => cur || newInv.id);
  }

  function removeInverter() {
    if (plant.inverters.length <= 1) return;
    const removed = plant.inverters[plant.inverters.length - 1];
    const nextPlant = { ...plant, inverters: plant.inverters.slice(0, -1) };
    persistPlant(nextPlant);
    setDrafts((prev) => { const next = { ...prev }; delete next[removed.id]; return next; });
    setFaultLogInverterId((cur) => (cur === removed.id ? nextPlant.inverters[0]?.id ?? "" : cur));
  }

  function isDirty(inv) {
    const d = drafts[inv.id];
    return d.outputPct !== inv.outputPct || d.pfPct !== inv.pfPct || d.freqOffsetHz !== inv.freqOffsetHz;
  }

  function computeResult(inv) {
    // 제어 결과는 "적용된"(Store에 반영된) 값을 기준으로 산출한다 --
    // 임시값(draft)만 바꾸고 적용을 누르지 않으면 결과에 반영되지 않는다.
    const entry = window.RemoteControlEngine.buildControlLogEntry({
      inverterId: inv.id, inverterName: inv.name, outputPct: inv.outputPct,
      pfPct: inv.pfPct, freqOffsetHz: inv.freqOffsetHz, ratedKw: inv.ratedKw,
    });
    Store.addControlLog(entry);
    setResultFor(entry);
  }

  const resultInverter = resultFor;

  // 표준 프로토콜(js/inverter-fault-protocol.js)의 controlHint가 "차단기
  // OFF"류 대응을 가리키는 경우, 그 자리에서 바로 해당 인버터의 개별
  // 차단기를 끄는 확인창을 띄운다 -- 표를 읽는 데서 그치지 않고 실제
  // 원격 제어 액션으로 이어지도록 하기 위함.
  function applyFaultControlHint(fault) {
    if (fault.controlHint.includes("차단기 OFF")) {
      requestBreakerSwitch(fault.inverterId, false);
    }
  }

  // "증상에 의한 조치기록" -- 세트포인트 기준의 controlLogs와 달리,
  // 표준화된 고장 이벤트 + 실제로 취한 조치를 사람이 남기는 이력.
  function logFaultAction(fault) {
    const note = window.prompt(
      "[" + fault.vendor + " " + fault.rawCode + " / " + fault.standardCode + "] " + fault.label + " - 조치 내용을 입력하세요 (선택, 비워두면 표준 조치가 기록됩니다):",
      ""
    );
    if (note === null) return; // 취소
    const entry = {
      id: "fault-" + Date.now() + "-" + fault.inverterId,
      timestamp: new Date().toISOString(),
      inverterId: fault.inverterId,
      inverterName: fault.inverterName,
      vendor: fault.vendor,
      rawCode: fault.rawCode,
      standardCode: fault.standardCode,
      category: fault.label,
      cause: fault.cause,
      actionTaken: note.trim() ? note.trim() : fault.standardAction,
      controlHint: fault.controlHint,
    };
    Store.addFaultActionLog(entry);
    setJustLoggedId(fault.id);
    window.setTimeout(() => setJustLoggedId((c) => (c === fault.id ? null : c)), 2000);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <PhaseVectorPanel usage={usage} />
      <Panel title="발전소 제어" eyebrow="Power Plant Control · 클릭 시 ON/OFF 스위치 및 제어 창 오픈">
        <div className="pp-breaker-table">
          <div className="pp-breaker-row">
            <span>발전소 메인 차단기</span>
            <button className={"pp-switch " + (plant.mainBreaker ? "on" : "off")} onClick={() => requestBreakerSwitch("main", !plant.mainBreaker)}>
              {plant.mainBreaker ? "ON" : "OFF"}
            </button>
          </div>
          <div className="pp-breaker-row">
            <span>발전소 인버터 차단기 (전체 제어 적용됨에 주의)</span>
            <button className={"pp-switch " + (plant.inverterBreaker ? "on" : "off")} onClick={() => requestBreakerSwitch("inverterAll", !plant.inverterBreaker)}>
              {plant.inverterBreaker ? "ON" : "OFF"}
            </button>
          </div>
        </div>

        <div className="pp-indiv-breaker-header">
          <div className="pp-indiv-breaker-title mono">인버터별 개별 차단기</div>
          <div className="pp-indiv-breaker-io">
            <button className="pp-io-btn mono" onClick={addInverter} title="인버터 추가">+</button>
            <button className="pp-io-btn mono" onClick={removeInverter} disabled={plant.inverters.length <= 1} title="마지막 인버터 삭제">\u2212</button>
          </div>
        </div>
        <div className="pp-indiv-breaker-grid">
          {plant.inverters.map((inv) => (
            <div className="pp-breaker-row" key={inv.id}>
              <span>{inv.name}</span>
              <button className={"pp-switch small " + (inv.on ? "on" : "off")} onClick={() => requestBreakerSwitch(inv.id, !inv.on)}>
                {inv.on ? "ON" : "OFF"}
              </button>
            </div>
          ))}
        </div>
      </Panel>

      <Panel title="인버터 개별 제어" eyebrow="값 수정 후 반드시 [적용]을 눌러야 실제로 반영됩니다 (기능 지원 장비 탑재 발전소만 가능)">
        <div className="pp-inv-cards">
          {plant.inverters.map((inv) => {
            const draft = drafts[inv.id];
            const dirty = isDirty(inv);
            return (
              <div className={"pp-inv-card" + (dirty ? " dirty" : "")} key={inv.id}>
                <div className="pp-inv-card-head">
                  <span>{inv.name}</span>
                  {dirty && <span className="pp-dirty-badge mono">미적용</span>}
                </div>
                <label className="pp-inv-field mono">
                  <span>출력제어(%)</span>
                  <NumberStepper value={draft.outputPct} step={1} min={0} max={100}
                    onChange={(v) => updateDraft(inv.id, "outputPct", v)} />
                </label>
                <label className="pp-inv-field mono">
                  <span>역률(%)</span>
                  <NumberStepper value={draft.pfPct} step={1} min={0} max={100}
                    onChange={(v) => updateDraft(inv.id, "pfPct", v)} />
                </label>
                <label className="pp-inv-field mono">
                  <span>주파수변경(Hz)</span>
                  <NumberStepper value={draft.freqOffsetHz} step={0.1} decimals={1} min={-2} max={2}
                    onChange={(v) => updateDraft(inv.id, "freqOffsetHz", v)} />
                </label>
                <div className="pp-inv-card-actions">
                  <button className={"pp-apply-btn" + (dirty ? " dirty" : "")} disabled={!dirty} onClick={() => requestApplySettings(inv.id)}>적용</button>
                  <button className="pp-result-btn" onClick={() => computeResult(inv)}>제어 결과</button>
                </div>
              </div>
            );
          })}
        </div>
      </Panel>

      <Panel
        title="인버터 고장(FAULT) 이벤트"
        eyebrow="표준 프로토콜(js/inverter-fault-protocol.js) 기반 · 고장이 실제로 발생한 인버터만 카드로 표시됩니다"
      >
        {activeFaults.length === 0 ? (
          <div className="fault-empty mono">현재 활성 고장 없음 -- 고장이 발생하면 이 자리에 자동으로 카드가 표시됩니다.</div>
        ) : (
          <div className="fault-event-cards">
            {activeFaults.map((f) => (
              <div className="fault-event-card" key={f.id} style={{ borderLeftColor: window.FAULT_SEVERITY_COLOR[f.severity] ?? "var(--hairline)" }}>
                <div className="fault-event-head">
                  <span className="fault-event-inv">{f.inverterName}</span>
                  <span className="mono fault-event-code" style={{ color: window.FAULT_SEVERITY_COLOR[f.severity] ?? "var(--text)" }}>
                    {f.vendor} {f.rawCode} <span className="fault-event-std">(표준: {f.standardCode})</span>
                  </span>
                </div>
                <div className="fault-event-row"><span className="fault-event-label mono">고장 요인</span><span>{f.label}</span></div>
                <div className="fault-event-row"><span className="fault-event-label mono">발생 원인</span><span className="mono" style={{ fontSize: 12, color: "var(--text-faint)" }}>{f.cause}</span></div>
                <div className="fault-event-row"><span className="fault-event-label mono">표준 조치</span><span style={{ fontSize: 13 }}>{f.standardAction}</span></div>
                <div className="fault-event-row"><span className="fault-event-label mono">원격 제어 대응</span><span className="mono" style={{ fontSize: 12, color: "var(--phosphor)" }}>{f.controlHint}</span></div>
                <div className="fault-event-actions">
                  {f.controlHint.includes("차단기 OFF") && (
                    <button className="fault-quick-btn" onClick={() => applyFaultControlHint(f)}>차단기 OFF 실행</button>
                  )}
                  <button className={"fault-log-btn" + (justLoggedId === f.id ? " done" : "")} onClick={() => logFaultAction(f)}>
                    {justLoggedId === f.id ? "기록됨 \u2713" : "조치 기록"}
                  </button>
                </div>
              </div>
            ))}
          </div>
        )}
        <style>{`
          .fault-empty { padding: 20px 4px; color: var(--text-faint); font-size: 14px; }
          .fault-event-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 12px; }
          .fault-event-card { border: 1px solid var(--hairline); border-left: 4px solid var(--hairline); border-radius: var(--radius); padding: 14px; background: var(--panel-raised); display: flex; flex-direction: column; gap: 8px; }
          .fault-event-head { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 6px; }
          .fault-event-inv { font-size: 15px; font-weight: 700; color: var(--text); }
          .fault-event-code { font-size: 13px; font-weight: 700; }
          .fault-event-std { font-weight: 400; color: var(--text-faint); }
          .fault-event-row { display: flex; flex-direction: column; gap: 2px; font-size: 13px; }
          .fault-event-label { font-size: 11px; color: var(--text-faint); }
          .fault-event-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
          .fault-quick-btn { padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--alert); color: var(--alert); background: transparent; font-size: 12px; cursor: pointer; white-space: nowrap; }
          .fault-log-btn { padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--hairline); color: var(--text-muted); background: var(--panel); font-size: 12px; cursor: pointer; white-space: nowrap; }
          .fault-log-btn.done { border-color: var(--success); color: var(--success); }
        `}</style>
      </Panel>

      {resultInverter && (
        <Panel title={resultInverter.inverterName + " 제어 결과"} eyebrow={resultInverter.standardBasis}>
          <div className="mono" style={{ fontSize: 13, color: resultInverter.gridConnectionMaintained ? "var(--success)" : "var(--alert)", marginBottom: 12, fontWeight: 700 }}>
            {resultInverter.gridConnectionMaintained ? "판정: 계통 연계 유지" : "판정: 일부 주파수 구간에서 연계 탈락 발생"}
          </div>

          <div style={{ marginBottom: 14 }}>
            <div className="pp-result-subtitle">유효전력 제어</div>
            <div className="pp-result-table">
              <div className="pp-result-row pp-result-head mono"><span>가용 유효전력(%)</span><span>제어값(%)</span><span>유효전력 출력(W)</span><span>무효전력 출력(Var)</span><span>역률(%)</span></div>
              <div className="pp-result-row mono">
                <span>{resultInverter.activePowerResult.availablePct}</span>
                <span>{resultInverter.activePowerResult.controlPct}</span>
                <span>{resultInverter.activePowerResult.wOut.toLocaleString()}</span>
                <span>{resultInverter.activePowerResult.varOut}</span>
                <span>{resultInverter.activePowerResult.pf}</span>
              </div>
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <div className="pp-result-subtitle">역률 제어</div>
            <div className="pp-result-table">
              <div className="pp-result-row pp-result-head mono"><span>유효전력(%)</span><span>구분</span><span>제어값(%)</span><span>유효전력 출력(W)</span><span>무효전력 출력(Var)</span></div>
              <div className="pp-result-row mono">
                <span>{resultInverter.powerFactorResult.activePct}</span>
                <span>{resultInverter.powerFactorResult.mode}</span>
                <span>{resultInverter.powerFactorResult.controlPct}</span>
                <span>{resultInverter.powerFactorResult.wOut.toLocaleString()}</span>
                <span>{resultInverter.powerFactorResult.varOut.toLocaleString()}</span>
              </div>
            </div>
          </div>

          <div>
            <div className="pp-result-subtitle">주파수 제어 (실시간 판정 결과)</div>
            <div className="pp-result-table">
              <div className="pp-freq-row pp-result-head mono"><span>주파수(Hz)</span><span>유지시간(s)</span><span>1회차</span><span>2회차</span><span>판정 근거</span></div>
              {resultInverter.frequencyResult.map((f, i) => (
                <div className="pp-freq-row mono" key={i} style={{ color: f.normal ? "var(--text)" : "var(--alert)" }}>
                  <span>{f.hz.toFixed(1)}</span><span>{f.holdSec}</span><span>{f.round1}</span><span>{f.round2}</span><span style={{ fontSize: 11 }}>{f.band}</span>
                </div>
              ))}
            </div>
          </div>
        </Panel>
      )}

      <Panel title="제어 기록" eyebrow="세트포인트 조작 이력 (최근 200건 보관) · 아래 [내보내기]로 로컬 data 폴더에 JSON으로 저장할 수 있습니다">
        <div className="pp-log-toolbar">
          <button className="pp-export-btn mono" onClick={() => exportLogAsFile(logs, "control-logs")}>내보내기 (JSON \u2192 data 폴더)</button>
        </div>
        <p className="mono" style={{ fontSize: 12, color: "var(--text-faint)", marginTop: 0 }}>
          모든 원격 제어 조작은 여기에 구조화된 형태로 기록됩니다. 세트포인트, 판정 결과, 근거 기준을 함께 저장하므로
          그대로 학습 데이터셋(feature/label)으로 활용할 수 있습니다.
        </p>
        <div className="pp-log-list">
          {logs.slice(0, 8).map((l) => (
            <div className="pp-log-row mono" key={l.id}>
              <span>{new Date(l.timestamp).toLocaleTimeString("ko-KR", { hour12: false })}</span>
              <span>{l.inverterName}</span>
              <span>P {l.setpoints.outputPct}% · PF {l.setpoints.pfPct}% · \u0394f {l.setpoints.freqOffsetHz}Hz</span>
              <span style={{ color: l.gridConnectionMaintained ? "var(--success)" : "var(--alert)" }}>{l.gridConnectionMaintained ? "연계유지" : "탈락구간 있음"}</span>
            </div>
          ))}
          {logs.length === 0 && <div className="mono" style={{ fontSize: 13, color: "var(--text-faint)" }}>아직 기록된 제어 이력이 없습니다. 위에서 "제어 결과"를 실행해보세요.</div>}
        </div>

        <div className="pp-fault-log-divider mono">증상별 조치 기록 (표준 FAULT 프로토콜 기준)</div>
        <div className="pp-log-toolbar">
          <button className="pp-export-btn mono" onClick={() => exportLogAsFile(faultLogs, "fault-action-logs")}>내보내기 (JSON \u2192 data 폴더)</button>
        </div>
        <p className="mono" style={{ fontSize: 12, color: "var(--text-faint)", marginTop: 0, marginBottom: 10 }}>
          위쪽 세트포인트 로그와 달리, "어떤 고장 증상이 발생했고 실제로 무슨 조치를 했는지"를 사람이 남기는 이력입니다.
          "인버터 고장(FAULT) 이벤트"에서 [조치 기록]을 눌러 남깁니다.
        </p>
        <div className="pp-log-list">
          {faultLogs.slice(0, 8).map((l) => (
            <div className="pp-fault-log-row mono" key={l.id}>
              <span>{new Date(l.timestamp).toLocaleTimeString("ko-KR", { hour12: false })}</span>
              <span>{l.inverterName}</span>
              <span style={{ color: window.FAULT_SEVERITY_COLOR[window.STANDARD_FAULT_CATALOG[l.standardCode]?.severity] ?? "var(--text)", fontWeight: 700 }}>{l.vendor} {l.rawCode}</span>
              <span>{l.category}</span>
              <span style={{ fontSize: 12 }}>{l.actionTaken}</span>
            </div>
          ))}
          {faultLogs.length === 0 && <div className="mono" style={{ fontSize: 13, color: "var(--text-faint)" }}>아직 기록된 조치 이력이 없습니다. 위 "인버터 고장(FAULT) 이벤트"에서 [조치 기록]을 눌러보세요.</div>}
        </div>
      </Panel>

      {pendingAction && (
        <div className="pp-modal-backdrop" onClick={() => setPendingAction(null)}>
          <div className="pp-modal" onClick={(e) => e.stopPropagation()}>
            {pendingAction.type === "breaker" ? (
              <div className="mono" style={{ marginBottom: 14 }}>스위치를 {pendingAction.next ? "ON" : "OFF"} 상태로 변경하시겠습니까?</div>
            ) : (
              <div className="mono" style={{ marginBottom: 14 }}>
                {plant.inverters.find((i) => i.id === pendingAction.inverterId)?.name}의 출력제어/역률/주파수 설정을 적용하시겠습니까?
                <div style={{ marginTop: 8, fontSize: 12, color: "var(--text-faint)" }}>
                  출력 {drafts[pendingAction.inverterId]?.outputPct}% · 역률 {drafts[pendingAction.inverterId]?.pfPct}% · 주파수변경 {drafts[pendingAction.inverterId]?.freqOffsetHz}Hz
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              <button className="pp-modal-apply" onClick={confirmPendingAction}>적용하기</button>
              <button className="pp-modal-cancel" onClick={() => setPendingAction(null)}>취소하기</button>
            </div>
          </div>
        </div>
      )}

      <style>{`
        .pp-breaker-table { display: flex; flex-direction: column; gap: 8px; }
        .pp-breaker-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border: 1px solid var(--hairline); border-radius: var(--radius); font-size: 15px; }
        .pp-switch { padding: 8px 20px; border-radius: 999px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; }
        .pp-switch.on { background: var(--success); color: #fff; }
        .pp-switch.off { background: var(--hairline); color: var(--text-faint); }
        .pp-switch.small { padding: 6px 14px; font-size: 12px; }
        .pp-indiv-breaker-header { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 8px; }
        .pp-indiv-breaker-title { font-size: 13px; color: var(--text-faint); }
        .pp-indiv-breaker-io { display: flex; gap: 6px; }
        .pp-io-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; background: var(--panel-raised); border: 1px solid var(--hairline); color: var(--text-muted); font-size: 16px; line-height: 1; border-radius: var(--radius); cursor: pointer; }
        .pp-io-btn:hover:not(:disabled) { color: var(--phosphor); border-color: var(--phosphor); }
        .pp-io-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .pp-indiv-breaker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px; }
        /* 인버터 개별 제어 -- 한 줄에 6개 항목을 욱여넣던 표 대신, 카드

/* =========================================================================
   5e-2) 계통연계 보호협조 정정값 + 시험 체크리스트
   -- 한전 「분산형전원 배전계통 연계 기술기준」(H0-배전-기준-0015, 첨부파일
   PDF)의 제10~18조 내용을 별도 메뉴로 만들지 않고, 실제로 장비를 설정하는
   화면인 하드웨어 추상화 설정(DriverPage, /control/driver) 안에 내장한다.
   여기서 편집한 정정값(Store.relaySetpoints)은 GridProtectionPanel(태양광/
   ESS 모니터링 화면)의 실시간 판정에 그대로 사용되므로, 이 화면에서 값을
   바꾸면 모니터링 화면의 정상/이상 판정 기준도 즉시 바뀐다 -- 참고용 표가
   아니라 실제 시스템 로직의 입력값이다.
   ========================================================================= */
/* =========================================================================
   5e-2) 보호협조 정정값 + 실시간 현장 상황판
   -- 기준(한전 기술기준)은 이미 js/protection-standards.js 안의 판정
   로직에 녹아 있으므로, 화면에는 조문 번호나 표 인용을 노출하지 않는다.
   대신 그 기준으로 "지금 이 순간" 각 장치가 정상인지 이상인지를 실제
   숫자 데이터로 보여주는 상황판을 그린다 -- 현장에 나가지 않고도 데이터
   값만으로 상태를 판단할 수 있어야 한다는 요구사항을 위한 화면이다.
   ========================================================================= */
function computeDeviceLiveReading(device, tick) {
  // 장치 id를 시드로 사용해 장치마다 서로 다른(그러나 매 렌더마다 일관된)
  // 실측값처럼 보이는 패턴을 만든다.
  const seed = device.id.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const excursionTick = (tick + seed) % 90;
  const voltagePct = excursionTick === 40 ? 121 : excursionTick === 65 ? 69 : driftValue(100, tick + seed, 2.2);
  const frequencyHz = excursionTick === 75 ? 56.9 : driftValue(60, tick + seed, 0.07);
  const powerFactor = excursionTick === 20 ? 0.87 : 0.97 + Math.sin((tick + seed) / 4) * 0.01;
  const dcInjectionPct = excursionTick === 10 ? 0.65 : 0.1 + Math.abs(Math.sin((tick + seed) / 6)) * 0.05;
  const setpoints = Store.getRelaySetpoints();
  const v = window.ProtectionEngine.evaluateVoltage(voltagePct);
  const f = window.ProtectionEngine.evaluateFrequency(frequencyHz);
  const pf = window.ProtectionEngine.evaluatePowerFactor(powerFactor, setpoints);
  const dc = window.ProtectionEngine.evaluateDcInjection(dcInjectionPct, setpoints);
  const normal = v.normal && f.normal && pf.normal && dc.normal;
  return { voltagePct, frequencyHz, powerFactor, dcInjectionPct, normal, v, f, pf, dc };
}

  const tick = useRealtimeTick(2000);
  const devices = Store.getDevices();
  const readings = devices.map((d) => ({ device: d, r: computeDeviceLiveReading(d, tick) }));
  const normalCount = readings.filter((x) => x.r.normal).length;
  const abnormalCount = readings.length - normalCount;

  return (
    <Panel title="실시간 현장 상황판" eyebrow="방문 없이 데이터로 현장 상태 판단 -- 2초마다 갱신">

        <div className="lfs-summary-card">

          <span>장치</span><span>계통전압</span><span>주파수</span><span>역률</span><span>DC 유입</span><span>상태</span>
        </div>
        {readings.map(({ device, r }) => (
          <div className={"lfs-row" + (r.normal ? "" : " abnormal")} key={device.id}>

/* =========================================================================
   6) DIGITAL TWIN (plain Three.js -- no react-three-fiber, so it works
      with a CDN-only, no-build setup)
   ========================================================================= */

function DigitalTwinScene({ pack, readings, selectedId, onSelect }) {
  const mountRef = useRef(null);
  const selectedIdRef = useRef(selectedId);
  selectedIdRef.current = selectedId; // animate() reads this live, so selecting a cell doesn't need to rebuild the scene

  useEffect(() => {
    const mount = mountRef.current;
    const width = mount.clientWidth, height = mount.clientHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, width / height, 0.1, 100);
    camera.position.set(0, 0, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(window.devicePixelRatio);
    mount.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const p1 = new THREE.PointLight(0xffffff, 40); p1.position.set(5, 5, 8); scene.add(p1);
    const p2 = new THREE.PointLight(0x4ce6b0, 15); p2.position.set(-5, -3, 6); scene.add(p2);

    // Minimal drag-to-orbit + wheel-to-zoom camera control, implemented
    // directly with pointer events -- no THREE.OrbitControls addon needed
    // (that addon's CDN build turned out to ship an ES "import" that
    // classic scripts can't execute, which was the root cause of the
    // blank-screen syntax error). This keeps the whole app to plain
    // scripts with zero module/bundler requirements.
    const camState = { radius: 9, theta: 0, phi: Math.PI / 2.3 };
    function updateCameraFromState() {
      const { radius, theta, phi } = camState;
      camera.position.set(
        radius * Math.sin(phi) * Math.sin(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.cos(theta)
      );
      camera.lookAt(0, 0, 0);
    }
    updateCameraFromState();

    let dragging = false, lastX = 0, lastY = 0, dragDistance = 0;
    function onPointerDown(e) { dragging = true; lastX = e.clientX; lastY = e.clientY; dragDistance = 0; }
    function onPointerMove(e) {
      if (!dragging) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      dragDistance += Math.abs(dx) + Math.abs(dy);
      camState.theta -= dx * 0.008;
      camState.phi = Math.min(Math.PI - 0.1, Math.max(0.1, camState.phi - dy * 0.008));
      lastX = e.clientX; lastY = e.clientY;
      updateCameraFromState();
    }
    function onPointerUp() { dragging = false; }
    function onWheel(e) {
      e.preventDefault();
      camState.radius = Math.min(16, Math.max(5, camState.radius + e.deltaY * 0.01));
      updateCameraFromState();
    }
    renderer.domElement.addEventListener("pointerdown", onPointerDown);
    window.addEventListener("pointermove", onPointerMove);
    window.addEventListener("pointerup", onPointerUp);
    renderer.domElement.addEventListener("wheel", onWheel, { passive: false });

    const cols = 4;
    const meshes = [];
    pack.children.forEach((cell, i) => {
      const row = Math.floor(i / cols), col = i % cols;
      const x = (col - (cols - 1) / 2) * 1.05;
      const y = (row - (Math.ceil(pack.children.length / cols) - 1) / 2) * 1.4;
      const reading = readings[cell.id];
      const risk = tempToRisk(reading.temperature);
      const color = new THREE.Color(tempToColor(reading.temperature));
      const geo = new THREE.BoxGeometry(0.78, 1.15, 0.42);
      const mat = new THREE.MeshStandardMaterial({
        color, roughness: 0.45, metalness: 0.15,
        emissive: risk === "CRITICAL" ? color : new THREE.Color(0x000000),
        emissiveIntensity: risk === "CRITICAL" ? 0.6 : 0,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, 0);
      mesh.userData.cellId = cell.id;
      scene.add(mesh);
      meshes.push(mesh);
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function onClick(e) {
      if (dragDistance > 4) return; // was a drag, not a click
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(meshes);
      if (hits.length > 0) {
        const cellId = hits[0].object.userData.cellId;
        const cell = pack.children.find((c) => c.id === cellId);
        onSelect(cell, readings[cellId]);
      }
    }
    renderer.domElement.addEventListener("click", onClick);

    let raf;
    function animate() {
      raf = requestAnimationFrame(animate);
      meshes.forEach((m) => { m.scale.setScalar(m.userData.cellId === selectedIdRef.current ? 1.08 : 1); });
      renderer.render(scene, camera);
    }
    animate();

    function onResize() {
      const w = mount.clientWidth, h = mount.clientHeight;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("resize", onResize);
      renderer.domElement.removeEventListener("click", onClick);
      renderer.domElement.removeEventListener("pointerdown", onPointerDown);
      window.removeEventListener("pointermove", onPointerMove);
      window.removeEventListener("pointerup", onPointerUp);
      renderer.domElement.removeEventListener("wheel", onWheel);
      mount.removeChild(renderer.domElement);
      meshes.forEach((m) => { m.geometry.dispose(); m.material.dispose(); });
      renderer.dispose();
    };
  }, [pack, readings]);

  return <div ref={mountRef} style={{ width: "100%", height: "100%" }} />;
}

function DigitalTwinPage({ usage }) {
  // 상계용(NET_METERING): 기존의 단순한 Pack -> Cell 플로우 그대로
  // (용량/컨테이너 단계 자체를 건너뜀). 그 외 모드(ESS전용 등)는
  // 용량 설정 -> 컨테이너 선택 -> Pack -> Cell 3단계 마법사를 씁니다.
  // 두 플로우 모두 내부적으로는 같은 컨테이너 데이터 모델을 쓰는데,
  // 상계용은 그냥 첫 번째 컨테이너를 자동으로 골라서 그 안의 Pack/Cell로
  // 곧장 들어갈 뿐, 컨테이너 개념 자체를 화면에 노출하지 않습니다.
  const isSimpleFlow = usage === "NET_METERING";
  const [step, setStep] = useState(isSimpleFlow ? "twin" : "container");
  const [containers, setContainers] = useState(() => Store.getContainers());
  const [activeContainerId, setActiveContainerId] = useState(() => (isSimpleFlow ? Store.getContainers()[0].id : null));
  const [activePackId, setActivePackId] = useState(() => {
    if (!isSimpleFlow) return null;
    const packs = Store.getPacksForContainer(Store.getContainers()[0].id);
    return packs[0].id;
  });
  const [selected, setSelected] = useState(null);

  function handleApplyCapacity(capacityMw, containerType) {
    const next = Store.configureContainers(capacityMw, containerType);
    setContainers(next);
    setStep("container");
  }

  function handleSelectContainer(containerId) {
    setActiveContainerId(containerId);
    const packs = Store.getPacksForContainer(containerId);
    setActivePackId(packs[0].id);
    setSelected(null);
    setStep("twin");
  }

  if (isSimpleFlow) {
    return (
      <TwinCellView
        containerId={activeContainerId}
        activePackId={activePackId}
        setActivePackId={setActivePackId}
        selected={selected}
        setSelected={setSelected}
        onBackToContainers={null}
      />
    );
  }

  if (step === "capacity") {
    return <CapacitySetupPanel onApply={handleApplyCapacity} />;
  }

  if (step === "container") {
    return (
      <ContainerGridPanel
        containers={containers}
        onSelect={handleSelectContainer}
        onReconfigure={() => setStep("capacity")}
        onAddContainer={() => setContainers(prev => { Store.addContainer(); return Store.getContainers(); })}
        onRemoveContainer={() => setContainers(prev => { Store.removeContainer(); return Store.getContainers(); })}
      />
    );
  }

  return (
    <TwinCellView
      containerId={activeContainerId}
      activePackId={activePackId}
      setActivePackId={setActivePackId}
      selected={selected}
      setSelected={setSelected}
      onBackToContainers={() => setStep("container")}
    />
  );
}

function TwinCellView({ containerId, activePackId, setActivePackId, selected, setSelected, onBackToContainers }) {
  // Bumped only by addPack/removePack below. Without this, Store's
  // getters would be called fresh on every render (including on every
  // cell-selection click), producing new array/object references each
  // time -- which made the Three.js scene's useEffect (keyed on
  // `pack`/`readings`) think its inputs changed on every click and tear
  // down + rebuild the entire WebGL context repeatedly. That's what was
  // breaking the twin screen: rapid WebGL context churn eventually
  // fails outright (browsers cap concurrent contexts) or races with
  // itself during cleanup. Memoizing on a version counter that only
  // changes when packs actually change fixes it.
  const [packsVersion, setPacksVersion] = useState(0);

  const packs = useMemo(() => Store.getPacksForContainer(containerId), [containerId, packsVersion]);
  const activePack = useMemo(() => packs.find((p) => p.id === activePackId) ?? packs[0], [packs, activePackId]);
  const container = useMemo(() => Store.getContainers().find((c) => c.id === containerId), [containerId, packsVersion]);

  const readings = useMemo(() => {
    const map = {};
    for (const cell of activePack.children) map[cell.id] = mockCellReadingFor(cell.id);
    return map;
  }, [activePack]);

  const riskCounts = useMemo(() => {
    const vals = Object.values(readings);
    return {
      normal: vals.filter((r) => r.temperature <= 34).length,
      watch: vals.filter((r) => r.temperature > 34 && r.temperature <= 50).length,
      critical: vals.filter((r) => r.temperature > 50).length,
    };
  }, [readings]);

  // Pack add/remove goes through the Store (localStorage-backed, scoped
  // to this container), so the pack list survives a page refresh.
  function addPack() {
    Store.addPack(containerId);
    const next = Store.getPacksForContainer(containerId);
    setActivePackId(next[next.length - 1].id);
    setSelected(null);
    setPacksVersion((v) => v + 1);
  }

  function removePack() {
    const removed = Store.removePack(containerId);
    if (!removed) return; // Store enforces "always keep at least one"
    const next = Store.getPacksForContainer(containerId);
    if (activePackId === removed.id) {
      setActivePackId(next[next.length - 1].id);
      setSelected(null);
    }
    setPacksVersion((v) => v + 1);
  }

  return (
    <div className="twin-grid">
      <div className="col-main">
        <Panel
          title={(onBackToContainers ? (container?.label ?? "") + " \u2014 " : "") + activePack.label + " \uc140 \uc5f4\ud654 \ub9f5"}
          eyebrow={onBackToContainers ? "STEP 3 / 3 \u00b7 " + (container ? CONTAINER_TYPES[container.type].label : "") : "3D DIGITAL TWIN"}
          action={
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {onBackToContainers && <button className="back-btn mono" onClick={onBackToContainers}>\u2190 컨테이너 목록</button>}
              <PackSelector
                packs={packs}
                activeId={activePackId}
                onChange={(id) => { setActivePackId(id); setSelected(null); }}
                onAdd={addPack}
                onRemove={removePack}
                canRemove={packs.length > 1}
              />
            </div>
          }
        >
          <div className="scene-wrap">
            <DigitalTwinScene pack={activePack} readings={readings} selectedId={selected?.cell.id ?? null} onSelect={(cell, reading) => setSelected({ cell, reading })} />
          </div>
        </Panel>
        <Panel title="온도 범례" eyebrow="LEGEND">
          <div className="legend">
            <LegendSwatch temp={28} label="정상 (~30℃)" count={riskCounts.normal} />
            <LegendSwatch temp={44} label="주의 (34~50℃)" count={riskCounts.watch} />
            <LegendSwatch temp={58} label="위험 (50℃+)" count={riskCounts.critical} />
          </div>
        </Panel>
      </div>
      <div className="col-side">
        <Panel title="셀 상세" eyebrow="CELL DETAIL">
          <CellDetailPanel cell={selected?.cell ?? null} reading={selected?.reading ?? null} />
        </Panel>
      </div>
      <style>{`
        .twin-grid { display: grid; grid-template-columns: 1fr 300px; gap: 16px; align-items: start; }
        .col-main, .col-side { display: flex; flex-direction: column; gap: 16px; }
        .scene-wrap { height: 440px; border-radius: var(--radius); overflow: hidden; background: radial-gradient(circle at 50% 40%, #1c2531, var(--twin-bg)); }
        .legend { display: flex; gap: 20px; }
        .back-btn { background: none; border: 1px solid var(--hairline); color: var(--text-muted); padding: 6px 10px; border-radius: var(--radius); font-size: 13px; cursor: pointer; white-space: nowrap; }
        @media (max-width: 980px) { .twin-grid { grid-template-columns: 1fr; } }
      `}</style>
    </div>
  );
}
function LegendSwatch({ temp, label, count }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <span style={{ width: 14, height: 14, borderRadius: 2, background: tempToColor(temp), flexShrink: 0 }} />
      <span className="mono" style={{ fontSize: 15, color: "var(--text-muted)" }}>{label}</span>
      <span className="mono" style={{ fontSize: 15, color: "var(--text-faint)" }}>\u00d7{count}</span>
    </div>
  );
}

function ModeSelectPage() {
  useEffect(() => { document.title = Store.getSite().name + " \u00b7 Universal EMS"; }, []);
  const handleSelect = (usage) => navigate("/mode/" + USAGE_SLUG[usage]);
  return (
    <div className="mode-select-page">
      <UsageModeSelector onChange={handleSelect} />
      <style>{`.mode-select-page { flex: 1; display: flex; align-items: center; justify-content: center; }`}</style>
    </div>
  );
}

function ModeShell({ slug, rest }) {
  const usage = SLUG_TO_USAGE[slug];
  useEffect(() => {
    if (!usage) { navigate("/"); return; }
    if (rest === "" || rest === "/") {
      const groups = getNavForUsage(usage);
      const first = groups[0]?.items[0];
      if (first) navigate("/mode/" + slug + first.to);
    }
  }, [usage, rest, slug]);

  if (!usage) return null;
  if (rest === "" || rest === "/") return null; // redirecting

  const allItems = NAV_TREE.flatMap((g) => g.items);
  const matched = allItems.find((i) => i.to === rest);
  const DetailComponent = DETAIL_PAGES[rest];

  let content;
  if (rest === "/twin") {
    content = <DigitalTwinPage usage={usage} />;
  } else if (DetailComponent) {
    content = <DetailComponent usage={usage} />;
  } else if (matched) {
    content = <ComingSoonPage title={matched.label} note={STUB_NOTES[matched.to] ?? ""} />;
  } else {
    content = <Panel title="\ucc3e\uc744 \uc218 \uc5c6\ub294 \ud654\uba74" eyebrow="404">\uacbd\ub85c\ub97c \ud655\uc778\ud574\uc8fc\uc138\uc694.</Panel>;
  }

  return (
    <div className="mode-shell">
      <Sidebar usage={usage} slug={slug} />
      <div className="mode-content">{content}</div>
      <style>{`
        .mode-shell { display: flex; flex: 1; min-height: 0; }
        .mode-content { flex: 1; overflow-y: auto; padding: 20px; }
      `}</style>
    </div>
  );
}

function App() {
  const hash = useHashRoute();
  const alarms = Store.getAlarms();
  const alarmCounts = {
    warn: alarms.filter((a) => a.severity === "WARN" && a.status === "OPEN").length,
    critical: alarms.filter((a) => a.severity === "CRITICAL" && a.status === "OPEN").length,
    fatal: alarms.filter((a) => a.severity === "FATAL" && a.status === "OPEN").length,
  };

  let body;
  if (hash === "/" || hash === "") {
    body = <ModeSelectPage />;
  } else {
    const m = hash.match(/^\/mode\/([^/]+)(\/.*)?$/);
    if (m) {
      body = <ModeShell slug={m[1]} rest={m[2] ?? ""} />;
    } else {
      body = <ModeSelectPage />;
    }
  }

  return (
    <div className="shell grid-bg">
      <TopBar vpp={Store.getVppSummary()} controlMode={Store.getControlMode()} alarmCounts={alarmCounts} />
      <div className="shell-body">{body}</div>
      <style>{`
        .shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .shell-body { flex: 1; display: flex; min-height: 0; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  // Transform the app source with the JSX runtime explicitly set to
  // "classic" (React.createElement calls), NOT "automatic" (which emits
  // an import from "react/jsx-runtime" -- a real ES module import that a
  // plain script cannot execute, and the actual cause of the original
  // "Cannot use import statement outside a module" error). Babel's
  // preset-react has defaulted to "automatic" in recent versions, so we
  // pin it explicitly here rather than relying on the auto-scanned
  // data-presets="react" attribute, which offers no way to set this.
  (function () {
    var source = document.getElementById("app-source").textContent;
    var result = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      filename: "app.jsx",
    });
    (0, eval)(result.code);
  })();
</script>
