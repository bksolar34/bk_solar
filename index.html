     인식해 렌더링된 DOM 텍스트 전체를 자동으로 번역하므로, 아래처럼 일부

<!-- 안전망: 위 5개 js/*.js 파일이 어떤 이유로든(파일 경로 누락, 브라우저
     보안 설정 등) 로드되지 못했을 경우에도 화면이 완전히 멈추지 않도록,

     하지 않는다 (기존 값을 절대 덮어쓰지 않음). -->
<script>
  window.BRAND_CONFIG = window.BRAND_CONFIG || { nameKo: "부광솔라", name: "BUKWANG SOLAR", tagline: "Smart Safety Plants", logo: "./assets/bukwang-logo.png" };
  window.DRIVER_DB = window.DRIVER_DB || {};
  window.PROTECTION_STANDARDS = window.PROTECTION_STANDARDS || {
    voltageTripTable: [], frequencyTripTable: [], voltageFluctuationTable: [],
    islandingClearingTimeSec: 0.5, reconnectionDelayMin: 5, powerFactorMinPct: 90,
    dcInjectionLimitPct: 0.5, lowVoltageSwitchingLimitPct: 6,
    voltageBands: [{ min: 90, max: 110, timeSec: null, label: "정상 범위" }],
    frequencyBands: [{ min: 57.5, max: 61.5, timeSec: null, label: "정상 범위" }],
    defaultRelaySetpoints: { islandingClearingTimeSec: 0.5, reconnectionDelayMin: 5, powerFactorMinPct: 90, dcInjectionLimitPct: 0.5, lowVoltageSwitchingLimitPct: 6 },
  };
  window.ProtectionEngine = window.ProtectionEngine || {
    _findBand(value, bands) { return (bands || []).find((b) => (b.min === undefined || value >= b.min) && (b.max === undefined || value < b.max)) ?? null; },
    evaluateVoltage(pct) { const band = this._findBand(pct, window.PROTECTION_STANDARDS.voltageBands); return { normal: !band || band.timeSec === null, clearingTimeSec: band?.timeSec ?? null, label: band?.label ?? "-" }; },
    evaluateFrequency(hz) { const band = this._findBand(hz, window.PROTECTION_STANDARDS.frequencyBands); return { normal: !band || band.timeSec === null, clearingTimeSec: band?.timeSec ?? null, label: band?.label ?? "-" }; },
    evaluatePowerFactor(pf, sp) { const minPct = sp?.powerFactorMinPct ?? 90; return { normal: pf * 100 >= minPct, minPct }; },
    evaluateDcInjection(pct, sp) { const limitPct = sp?.dcInjectionLimitPct ?? 0.5; return { normal: pct <= limitPct, limitPct }; },
    getDefaultSetpoints() { return { ...window.PROTECTION_STANDARDS.defaultRelaySetpoints }; },
  };
  window.CommEngine = window.CommEngine || {
    filterCommLinks(links, usage, equipment) { if (usage !== "NET_METERING") return links; return links.filter((l) => l.system === "COMMON" || l.system === equipment); },
    filterDevices(devices, usage, equipment) { if (usage !== "NET_METERING") return devices; return devices.filter((d) => d.system === "COMMON" || d.system === equipment); },
  };
  window.ForecastEngine = window.ForecastEngine || {
    buildRows(weather, capacityKw) {
      const hourly = weather.hourly;
      const now = new Date();
      const nowIdx = hourly.time.findIndex((t) => new Date(t) >= now);
      const startIdx = Math.max(0, nowIdx - 6);
      const rows = [];
      for (let i = startIdx; i < Math.min(hourly.time.length, startIdx + 18); i++) {
        const radiation = hourly.shortwave_radiation[i];
        const theoreticalKw = Math.min(capacityKw, capacityKw * (radiation / 1000));
        const seed = i % 7 === 3 ? 0.55 : 0.9 + Math.sin(i) * 0.08;
        const actualKw = Math.max(0, theoreticalKw * seed);
        rows.push({ time: new Date(hourly.time[i]), radiation, theoreticalKw, actualKw, isPast: i < nowIdx });
      }
      return rows;
    },
    classifyIntermittency(rows) { return rows.map((r) => ({ ...r, cause: null })); },
    computeBiasFactor(rows) {
      const pastRows = rows.filter((r) => r.isPast && r.theoreticalKw > 50);
      if (!pastRows.length) return 1;
      return pastRows.reduce((a, r) => a + r.actualKw / r.theoreticalKw, 0) / pastRows.length;
    },
    buildHorizonPoints(rows) {
      const futureRows = rows.filter((r) => !r.isPast);
      return [
        { label: "15분 후", row: futureRows[0] },
        { label: "1시간 후", row: futureRows[Math.min(1, futureRows.length - 1)] },
        { label: "24시간 후", row: futureRows[futureRows.length - 1] },
      ].filter((p) => p.row);
    },
    analyze(weather, capacityKw) {
      const rows = this.classifyIntermittency(this.buildRows(weather, capacityKw));
      return { rows, biasFactor: this.computeBiasFactor(rows), horizonPoints: this.buildHorizonPoints(rows) };
    },
  };
  window.RemoteControlEngine = window.RemoteControlEngine || {
    computeActivePowerControlTable(ratedKw, rows) {
      return rows.map((r) => {
        const wOut = ratedKw * 1000 * (r.availablePct / 100) * (r.controlPct / 100);
        return { ...r, wOut: Math.round(wOut), varOut: 0, pf: wOut > 0 ? 100 : 0 };
      });
    },
    computePowerFactorControlTable(ratedKw, rows) {
      return rows.map((r) => {
        const wOut = ratedKw * 1000 * (r.activePct / 100);
        const pfFraction = r.controlPct / 100;
        const varOut = r.mode === "단위" ? 0 : Math.round(wOut * Math.tan(Math.acos(pfFraction)));
        return { ...r, wOut: Math.round(wOut), varOut, pf: r.controlPct };
      });
    },
    computeFrequencyControlTable(activePct, freqPoints) {
      return freqPoints.map((hz) => {
        const evalResult = window.ProtectionEngine.evaluateFrequency(hz);
        const holdSec = evalResult.normal ? 60 : Math.max(evalResult.clearingTimeSec, 0.16) < 1 ? 20 : Math.round(evalResult.clearingTimeSec);
        const round = evalResult.normal ? "유지" : "탈락";
        return { activePct, hz, holdSec, round1: round, round2: round, band: evalResult.label, normal: evalResult.normal };
      });
    },
    buildControlLogEntry({ inverterId, inverterName, outputPct, pfPct, freqOffsetHz, ratedKw }) {
      const freqPoints = [60.0, 60.5, 61.0, 61.5, 59.5, 59.0, 58.5, 58.0, 57.5];
      const activeTable = this.computeActivePowerControlTable(ratedKw, [{ availablePct: 100, controlPct: outputPct }]);
      const pfTable = this.computePowerFactorControlTable(ratedKw, [{ activePct: 100, mode: "지상", controlPct: pfPct }]);
      const freqTable = this.computeFrequencyControlTable(100, freqPoints);
      const anyTrip = freqTable.some((f) => !f.normal);
      return {
        id: "ctrl-" + Date.now() + "-" + inverterId, timestamp: new Date().toISOString(),
        inverterId, inverterName, setpoints: { outputPct, pfPct, freqOffsetHz },
        activePowerResult: activeTable[0], powerFactorResult: pfTable[0], frequencyResult: freqTable,
        standardBasis: "실시간 판정 기준: 하드웨어 추상화 설정의 보호협조 정정값과 동일", gridConnectionMaintained: !anyTrip,
      };
    },
  };
  window.STANDARD_FAULT_CATALOG = window.STANDARD_FAULT_CATALOG || {};
  window.VENDOR_FAULT_MAP = window.VENDOR_FAULT_MAP || { INO: {}, KACO: {} };
  window.FAULT_SEVERITY_COLOR = window.FAULT_SEVERITY_COLOR || { FATAL: "var(--alert)", CRITICAL: "var(--alert)", WARN: "var(--warn)" };
  window.FaultProtocol = window.FaultProtocol || {
    resolve: () => null, vendors: () => Object.keys(window.VENDOR_FAULT_MAP),
    rawCodesFor: (v) => Object.keys(window.VENDOR_FAULT_MAP[v] ?? {}),
  };
</script>

<script type="text/plain" id="app-source">
const { useState, useEffect, useRef, useMemo } = React;

/* =========================================================================
   0) 다국어 번역: 자체 무료 API(Google/MyMemory) 번역은 완전히 걷어냄.
   이유:
     - <T>로 감싼 일부 문구(14곳)만 번역 대상이 되어, 감싸지 않은 대다수의
       한글 텍스트(수백 곳)는 언어를 바꿔도 그대로 한글로 남는 문제가 있었음
       -> "영어로 바꿔도 한글이 더 많다"는 문제의 직접적인 원인.
     - 비공식 무료 엔드포인트 호출이 실패하면(CORS, 네트워크 차단 등) 그
       자리에서 조용히 원문(한글)으로 되돌아가 번역 자체가 안 되는 것처럼
       보였음.
   대안: <html lang="ko">를 유지한 채 페이지의 모든 텍스트를 항상 순수
   한국어 DOM으로만 렌더링한다. 이렇게 하면 크롬 주소창의 번역 아이콘(또는
   우클릭 -> "한국어(으)로 번역")을 눌렀을 때, 크롬 내장 번역 엔진이 렌더링된
   DOM 텍스트 전체를 훑어 빠짐없이 번역해준다 -- 일부 문구만 골라 번역하던
   예전 방식보다 훨씬 넓고 안정적으로 "화면 전체"가 번역된다.
   T는 과거 코드와의 호환을 위해 남겨두되, 이제는 그냥 원문을 그대로
   렌더링하는 통과(pass-through) 컴포넌트다.
   ========================================================================= */

function T({ children }) {

}

function clusterByCategory(items) {
  const buckets = [];
  for (const item of items) {
    const key = item.category ?? null;
    let bucket = buckets.find((b) => b.category === key);
    if (!bucket) { bucket = { category: key, items: [] }; buckets.push(bucket); }
    bucket.items.push(item);
  }
  return buckets;
}

/* =========================================================================
   2) DATA STORE -- a real (if small) client-side data layer, backed by
   the browser's localStorage. This replaces the earlier Node/Express/
   Prisma/PostgreSQL backend attempt: no server process, no database,
   no Docker -- just functions that read/write a JSON blob in the
   browser, so the whole system still runs by double-clicking this one
   file. State (like packs added/removed on the digital twin) now
   survives a page refresh, which plain in-memory mock data could not.

   Functions below mirror what the earlier server-side API endpoints
   did (getSite, getControlMode, addPack, removePack, ...), just
   implemented as local reads/writes instead of HTTP calls to a DB.
   ========================================================================= */

const STORE_KEY = "universal_ems_store_v1";

function loadState() {
  try {
    const raw = window.localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.warn("localStorage unavailable or corrupted, starting fresh:", e);
  }
  return null;
}

function persist(state) {
  try {
    window.localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Could not persist to localStorage (private browsing mode?):", e);
  }
}

// IMPORTANT: merge onto a fresh seed rather than using saved data
// as-is. Across the many versions of this app, new fields have been
// added to the store (devices, commLinks, reports, containers, ...).
// A visitor's browser may still have OLDER saved data from before
// those fields existed -- using it directly would leave those fields
// `undefined`, and any screen that reads them (e.g. `Store.getDevices()
// .map(...)`) would throw and silently fail to render, which is exactly
// what looked like "screens stuck loading forever." Merging the saved
// data on top of a fresh seedState() guarantees every field always has
// at least a sensible default.
let _state = Object.assign(seedState(), loadState() ?? {});
persist(_state); // make sure a first-run seed is written immediately

const Store = {
  getSite: () => _state.site,
  getVppSummary: () => _state.vppSummary,
  getControlMode: () => _state.controlMode,
  setControlMode(mode) {
    _state.controlMode = { mode };
    persist(_state);
  },
  getAlarms: () => _state.alarms,
  addAlarm(alarm) {
    _state.alarms = [alarm, ..._state.alarms];
    persist(_state);
  },
  acknowledgeAlarm(id) {
    _state.alarms = _state.alarms.map((a) => (a.id === id ? { ...a, status: "ACKNOWLEDGED" } : a));
    persist(_state);
  },
  getDevices: () => _state.devices,
  addDevice(device) {
    _state.devices = [..._state.devices, device];
    persist(_state);
  },
  removeDevice(id) {
    _state.devices = _state.devices.filter((d) => d.id !== id);
    persist(_state);
  },
  getCommLinks: () => _state.commLinks,
  getNetMeteringEquipment: () => _state.netMeteringEquipment ?? "SOLAR",
  setNetMeteringEquipment(value) {
    _state.netMeteringEquipment = value;
    persist(_state);
  },
  // 보호계전기 정정값 -- 기본값은 한전 기술기준(js/protection-standards.js)
  // 이지만, 하드웨어 추상화 설정 화면에서 현장 담당자가 직접 조정한
  // 값으로 덮어써진다. GridProtectionPanel(태양광/ESS 모니터링)이 이
  // 값을 그대로 읽어 실시간 판정에 사용한다.
  getRelaySetpoints: () => _state.relaySetpoints ?? window.ProtectionEngine.getDefaultSetpoints(),
  setRelaySetpoints(next) {
    _state.relaySetpoints = next;
    persist(_state);
  },
  // 발전소 원격 제어 (Dr. Bksolar 관리자 매뉴얼 23~26p 화면 구조).
  // 메인/인버터 차단기 상태와 인버터별 제어 설정값을 보관한다.
  getPlantControl: () => _state.plantControl,
  setPlantControl(next) {
    _state.plantControl = next;
    persist(_state);
  },
  // 원격 제어 조작 기록 -- 요청 4/5: 비정상 전압/주파수 분리시간 기준을
  // "표시만" 하지 않고, 실제 제어 결과 판정에 쓴 뒤 그 판정 결과를
  // 구조화된 데이터로 남긴다. 추후 이상탐지/예측 모델(예: YOLO 계열
  // 패턴 인식 파이프라인) 학습용 빅데이터의 원천이 되는 로그다.
  getControlLogs: () => _state.controlLogs ?? [],
  addControlLog(entry) {
    _state.controlLogs = [entry, ...(_state.controlLogs ?? [])].slice(0, 200); // 최근 200건 보관
    persist(_state);
  },
  // 증상별 조치 기록 (FAULT 코드 -> 실제 조치) -- 발전소 원격 제어
  // 화면의 "인버터 고장(FAULT) 코드별 제어 목록"에서 남긴다.
  getFaultActionLogs: () => _state.faultActionLogs ?? [],
  addFaultActionLog(entry) {
    _state.faultActionLogs = [entry, ...(_state.faultActionLogs ?? [])].slice(0, 200);
    persist(_state);
  },
  getLocation: () => _state.location,
  setLocation(loc) {
    _state.location = loc;
    persist(_state);
  },
  getObstructionAngle: () => _state.obstructionAngle,
  setObstructionAngle(deg) {
    _state.obstructionAngle = deg;
    persist(_state);
  },
  getGoogleApiKey: () => _state.googleApiKey,
  setGoogleApiKey(key) {
    _state.googleApiKey = key;
    persist(_state);
  },
  getDroop: () => _state.droop,
  setDroop(droop) {
    _state.droop = droop;
    persist(_state);
  },
  getTopologyConfig: () => _state.topologyConfig,
  setTopologyConfig(cfg) {
    _state.topologyConfig = cfg;
    persist(_state);
  },
  getMfaEnabled: () => _state.mfaEnabled,
  setMfaEnabled(enabled) {
    _state.mfaEnabled = enabled;
    persist(_state);
  },
  getReports: () => _state.reports,
  addReport(report) {
    _state.reports = [report, ..._state.reports];
    persist(_state);
  },
  getCapacityMw: () => _state.capacityMw,
  getContainerType: () => _state.containerType,
  getContainers() {
    if (!_state.containers) Store.configureContainers(_state.capacityMw, _state.containerType);
    return _state.containers;
  },
  // Regenerates the container list from a total site capacity (MW) and
  // a container product type (see CONTAINER_TYPES). Container count =
  // capacity / unit rating, rounded up so the site is never under-sized.
  // Existing packs on containers that still exist afterward are kept;
  // this is only destructive for containers beyond the new count.
  configureContainers(capacityMw, containerType) {
    const unitKw = CONTAINER_TYPES[containerType].kw;
    const totalKw = capacityMw * 1000;
    const count = Math.max(1, Math.ceil(totalKw / unitKw));
    const prev = _state.containers || [];
    const containers = Array.from({ length: count }, (_, i) => {
      const existing = prev[i];
      return {
        id: existing?.id ?? "container-" + i + "-" + Date.now(),
        label: "\uCEE8\uD14C\uC774\uB108 " + (i + 1),
        type: containerType,
        kw: unitKw,
        packs: existing?.packs ?? Array.from({ length: 4 }, (_, p) => ({ id: "pack-" + i + "-" + p, label: "Pack " + (p + 1) })),
      };
    });
    _state.capacityMw = capacityMw;
    _state.containerType = containerType;
    _state.containers = containers;
    persist(_state);
    return containers;
  },
  // Adds one container directly at the step-2 screen (independent of
  // the capacity/type math in step 1), using whatever container type is
  // currently configured. Recomputes capacityMw so the two stay
  // consistent (site capacity = sum of all container ratings).
  addContainer() {
    const containers = Store.getContainers();
    const containerType = _state.containerType;
    const unitKw = CONTAINER_TYPES[containerType].kw;
    const nextIndex = containers.length;
    const newContainer = {
      id: "container-" + nextIndex + "-" + Date.now(),
      label: "\uCEE8\uD14C\uC774\uB108 " + (nextIndex + 1),
      type: containerType,
      kw: unitKw,
      packs: Array.from({ length: 4 }, (_, p) => ({ id: "pack-" + nextIndex + "-" + p + "-" + Date.now(), label: "Pack " + (p + 1) })),
    };
    _state.containers = [...containers, newContainer];
    _state.capacityMw = Number((_state.containers.reduce((sum, c) => sum + c.kw, 0) / 1000).toFixed(3));
    persist(_state);
    return newContainer;
  },
  // Removes the most-recently-added container (always keeps at least
  // one), and recomputes capacityMw to match the remaining containers.
  removeContainer() {
    const containers = Store.getContainers();
    if (containers.length <= 1) return null;
    const removed = containers[containers.length - 1];
    _state.containers = containers.slice(0, -1);
    _state.capacityMw = Number((_state.containers.reduce((sum, c) => sum + c.kw, 0) / 1000).toFixed(3));
    persist(_state);
    return removed;
  },
  // Expands a container's stored pack list into the Pack -> Cell shape
  // the digital twin renders (cells themselves are never stored, only
  // derived, so this is cheap to call on every render).
  getPacksForContainer(containerId) {
    const container = Store.getContainers().find((c) => c.id === containerId);
    if (!container) return [];
    return container.packs.map((p) => ({
      id: p.id,
      label: p.label,
      children: Array.from({ length: 16 }, (_, i) => ({ id: p.id + "-cell-" + i, label: "Cell " + (i + 1) })),
    }));
  },
  addPack(containerId) {
    const containers = Store.getContainers();
    const container = containers.find((c) => c.id === containerId);
    if (!container) return null;
    const nextIndex = container.packs.length;
    const pack = { id: "pack-" + containerId + "-" + nextIndex + "-" + Date.now(), label: "Pack " + (nextIndex + 1) };
    container.packs = [...container.packs, pack];
    persist(_state);
    return pack;
  },
  removePack(containerId) {
    const containers = Store.getContainers();
    const container = containers.find((c) => c.id === containerId);
    if (!container || container.packs.length <= 1) return null; // always keep at least one
    const removed = container.packs[container.packs.length - 1];
    container.packs = container.packs.slice(0, -1);
    persist(_state);
    return removed;
  },
  // Wipes all saved state and re-seeds -- handy during development.
  reset() {
    _state = seedState();
    persist(_state);
  },
};

function mockCellReadingFor(assetId) {
  let seed = 0;
  for (const ch of assetId) seed = (seed * 31 + ch.charCodeAt(0)) % 100000;
  const rand = (seed % 1000) / 1000;
  let temperature = 26 + rand * 8;
  if (seed % 100 === 7) temperature = 42 + rand * 6;
  if (seed % 137 === 13) temperature = 54 + rand * 8;
  return {
    voltage: Number((3.55 + rand * 0.2).toFixed(3)),
    temperature: Number(temperature.toFixed(1)),
    soc: Number((40 + rand * 55).toFixed(1)),
    soh: Number((94 + rand * 5).toFixed(1)),
    timestamp: new Date().toISOString(),
  };
}

/* =========================================================================
   3) THERMAL COLOR HELPERS
   ========================================================================= */

const PHOSPHOR_RGB = [76, 230, 176];
const AMBER_RGB = [255, 180, 84];
const ALERT_RGB = [255, 85, 104];
function lerp(a, b, t) { return a + (b - a) * t; }
function mixRgb(c1, c2, t) { return [lerp(c1[0], c2[0], t), lerp(c1[1], c2[1], t), lerp(c1[2], c2[2], t)]; }
function tempToColor(t) {
  let rgb;
  if (t <= 34) rgb = PHOSPHOR_RGB;
  else if (t <= 50) rgb = mixRgb(PHOSPHOR_RGB, AMBER_RGB, (t - 34) / 16);
  else rgb = mixRgb(AMBER_RGB, ALERT_RGB, Math.min(1, (t - 50) / 15));
  return "rgb(" + rgb.map((v) => Math.round(v)).join(",") + ")";
}
function tempToRisk(t) { return t > 50 ? "CRITICAL" : t > 38 ? "WATCH" : "NORMAL"; }

/* =========================================================================
   4) HASH-BASED ROUTING (no react-router -- CDN-only setup)
   ========================================================================= */

function useHashRoute() {
  const [hash, setHash] = useState(() => window.location.hash.replace(/^#/, "") || "/");
  useEffect(() => {
    const onChange = () => setHash(window.location.hash.replace(/^#/, "") || "/");
    window.addEventListener("hashchange", onChange);
    return () => window.removeEventListener("hashchange", onChange);
  }, []);
  return hash;
}
function navigate(path) { window.location.hash = path; }

// Small "keeps feeling alive" helper for the telemetry-style detail
// screens: ticks on an interval so readouts can drift slightly, the
// same way real polled telemetry would, without needing a live feed.
function useRealtimeTick(intervalMs) {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick((x) => x + 1), intervalMs || 2000);
    return () => clearInterval(t);
  }, [intervalMs]);
  return tick;
}

function driftValue(base, tick, amplitude) {
  const amp = amplitude ?? 1;
  return base + Math.sin(tick / 2) * amp + (Math.sin(tick * 13.37) * amp) / 3;
}

function roundTo(v, decimals) {
  const p = Math.pow(10, decimals);
  return Math.round(v * p) / p;
}

// 로그를 JSON 파일로 다운로드한다. 이 앱은 브라우저에서만 동작하는
// 정적 페이지라 서버 없이 실제 파일시스템에 직접 쓸 수는 없으므로,
// "내보내기" 버튼으로 JSON을 내려받아 사용자가 로컬 data/ 폴더에
// 보관하도록 한다 (요청 3번: "별도의 data 폴더에 기록").
function exportLogAsFile(entries, baseName) {
  const stamp = new Date().toISOString().slice(0, 10);
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "data_" + baseName + "-" + stamp + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// 숫자 입력 옆에 +/- 버튼을 붙인 공용 컴포넌트 (요청: "인버터별 개별
// 차단기 및 개별제어에도 +,- 버튼 생성하고 연동"). 인버터 개별 제어의
// 출력제어(%)/역률(%)/주파수변경(Hz) 입력에서 재사용한다.
function NumberStepper({ value, onChange, step = 1, min, max, decimals = 0 }) {
  function clamp(v) {
    let x = roundTo(v, decimals);
    if (min !== undefined) x = Math.max(min, x);
    if (max !== undefined) x = Math.min(max, x);
    return x;
  }
  return (
    <div className="num-stepper">
      <button type="button" className="num-stepper-btn" onClick={() => onChange(clamp(value - step))}>\u2212</button>
      <input type="number" className="num-stepper-input" value={value} step={step}
        onChange={(e) => onChange(clamp(parseFloat(e.target.value) || 0))} />
      <button type="button" className="num-stepper-btn" onClick={() => onChange(clamp(value + step))}>+</button>
      <style>{`
        .num-stepper { display: flex; align-items: center; gap: 4px; }
        .num-stepper-input { width: 100%; text-align: center; padding: 6px 4px; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--panel); color: var(--text); }
        .num-stepper-btn { width: 26px; height: 26px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--panel-raised); color: var(--text-muted); font-size: 15px; line-height: 1; cursor: pointer; }
        .num-stepper-btn:hover { color: var(--phosphor); border-color: var(--phosphor); }
      `}</style>
    </div>
  );
}

/**
 * GridProtectionPanel -- 요청 2/3에 대한 핵심 구현.
 *
 * 한전 「분산형전원 배전계통 연계 기술기준」의 전압/주파수 분리시간,
 * 단독운전 방지, 재병입 지연, 역률, 직류유입 제한을 "참고용 문서 화면"이
 * 아니라, 태양광/ESS 모니터링 화면에서 실시간으로 판정하는 살아있는
 * 로직으로 붙여넣은 공용 컴포넌트. SolarPage/EssPage 양쪽에서 재사용한다.
 *
 * - 계통전압(%)·주파수(Hz)는 driftValue로 미세하게 흔들리다가, 데모/현장
 *   테스트 목적으로 주기적으로 짧게 기준을 벗어나도록 만들어 실제 보호
 *   로직이 살아있음을 보여준다 (실제 배포 시에는 이 부분만 실계측값
 *   구독으로 교체하면 됨).
 * - window.ProtectionEngine으로 매 tick 판정하고, 기준을 벗어나면
 *   Store.addAlarm으로 실제 알람을 생성한다 (중복 생성은 방지).
 * - 정정값은 Store.getRelaySetpoints() -- 즉 하드웨어 추상화 설정 화면
 *   에서 조정한 값이 곧바로 이 판정에 반영된다.
 */
function GridProtectionPanel({ systemLabel, deviceName }) {
  const tick = useRealtimeTick(2000);
  const setpoints = Store.getRelaySetpoints();

  // 평상시엔 정상 범위 안에서 미세하게 흔들리다가, 60틱 중 3틱 정도는
  // 시연/현장 테스트용으로 기준을 벗어나는 상황을 만든다.
  const excursionTick = tick % 60;
  const voltagePct = excursionTick === 20 ? 122 : excursionTick === 40 ? 68 : driftValue(100, tick, 2.5);
  const frequencyHz = excursionTick === 50 ? 56.8 : driftValue(60, tick, 0.08);
  const powerFactor = excursionTick === 30 ? 0.86 : 0.97 + Math.sin(tick / 3) * 0.01;
  const dcInjectionPct = excursionTick === 10 ? 0.7 : 0.12 + Math.abs(Math.sin(tick / 5)) * 0.05;

  const vResult = window.ProtectionEngine.evaluateVoltage(voltagePct);
  const fResult = window.ProtectionEngine.evaluateFrequency(frequencyHz);
  const pfResult = window.ProtectionEngine.evaluatePowerFactor(powerFactor, setpoints);
  const dcResult = window.ProtectionEngine.evaluateDcInjection(dcInjectionPct, setpoints);
  const allNormal = vResult.normal && fResult.normal && pfResult.normal && dcResult.normal;

  // 위반이 새로 발생한 시점에만 알람 1건을 올린다 (매 tick마다 중복 생성 방지)
  const lastAlarmedRef = useRef(null);
  useEffect(() => {
    const violation = !vResult.normal ? "voltage" : !fResult.normal ? "frequency" : !pfResult.normal ? "pf" : !dcResult.normal ? "dc" : null;
    if (violation && lastAlarmedRef.current !== violation) {
      lastAlarmedRef.current = violation;
      const messages = {
        voltage: deviceName + " 계통전압 이상(" + voltagePct.toFixed(1) + "%) 감지 - " + vResult.clearingTimeSec + "초 이내 분리 필요",
        frequency: deviceName + " 계통주파수 이상(" + frequencyHz.toFixed(2) + "Hz) 감지 - " + fResult.clearingTimeSec + "초 이내 분리 필요",
        pf: deviceName + " 역률 저하(" + (powerFactor * 100).toFixed(1) + "%, 기준 " + pfResult.minPct + "% 이상) 감지",
        dc: deviceName + " 직류(DC) 유입 초과(" + dcInjectionPct.toFixed(2) + "%, 기준 " + dcResult.limitPct + "% 이하) 감지",
      };
      Store.addAlarm({
        id: "prot-" + Date.now(),
        severity: violation === "voltage" || violation === "frequency" ? "CRITICAL" : "WARN",
        status: "OPEN",
        message: messages[violation],
        createdAt: new Date().toISOString(),
      });
    } else if (!violation) {
      lastAlarmedRef.current = null;
    }
  }, [excursionTick]);

  return (
    <Panel
      title={"계통연계 보호협조 상태 (" + systemLabel + ")"}
      eyebrow="실시간 판정 · 정정값은 하드웨어 추상화 설정에서 조정"
    >
      <div className="gp-grid">
        <div className={"gp-cell" + (vResult.normal ? "" : " abnormal")}>
          <span className="gp-label mono">계통전압</span>
          <span className="gp-value mono">{voltagePct.toFixed(1)}<span className="gp-unit">%</span></span>
          <span className="gp-status mono">{vResult.normal ? "정상" : "이상 · " + vResult.clearingTimeSec + "초 이내 분리"}</span>
        </div>
        <div className={"gp-cell" + (fResult.normal ? "" : " abnormal")}>
          <span className="gp-label mono">계통주파수</span>
          <span className="gp-value mono">{frequencyHz.toFixed(2)}<span className="gp-unit">Hz</span></span>
          <span className="gp-status mono">{fResult.normal ? "정상" : "이상 · " + fResult.clearingTimeSec + "초 이내 분리"}</span>
        </div>
        <div className={"gp-cell" + (pfResult.normal ? "" : " abnormal")}>
          <span className="gp-label mono">역률</span>
          <span className="gp-value mono">{(powerFactor * 100).toFixed(1)}<span className="gp-unit">%</span></span>
          <span className="gp-status mono">{pfResult.normal ? "정상" : "기준 " + pfResult.minPct + "% 미달"}</span>
        </div>
        <div className={"gp-cell" + (dcResult.normal ? "" : " abnormal")}>
          <span className="gp-label mono">직류(DC) 유입</span>
          <span className="gp-value mono">{dcInjectionPct.toFixed(2)}<span className="gp-unit">%</span></span>
          <span className="gp-status mono">{dcResult.normal ? "정상" : "기준 " + dcResult.limitPct + "% 초과"}</span>
        </div>
      </div>
      <div className={"gp-summary mono" + (allNormal ? "" : " abnormal")}>
        {allNormal
          ? "단독운전 검출 기준 " + setpoints.islandingClearingTimeSec + "초 / 재병입 지연 " + setpoints.reconnectionDelayMin + "분 (정상 대기 중)"
          : "보호협조 기준 이탈 -- 분리 로직 동작 중 (재병입은 정상 복귀 후 " + setpoints.reconnectionDelayMin + "분 지연)"}
      </div>
      <style>{`
        .gp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .gp-cell { display: flex; flex-direction: column; gap: 4px; padding: 12px; border: 1px solid var(--hairline); border-radius: var(--radius); background: var(--panel-raised); }
        .gp-cell.abnormal { border-color: var(--alert); background: color-mix(in srgb, var(--alert) 10%, var(--panel-raised)); }
        .gp-label { font-size: 12px; color: var(--text-faint); }
        .gp-value { font-size: 22px; font-weight: 700; color: var(--text); }
        .gp-unit { font-size: 13px; color: var(--text-muted); margin-left: 3px; font-weight: 400; }
        .gp-status { font-size: 12px; color: var(--success); }
        .gp-cell.abnormal .gp-status { color: var(--alert); font-weight: 700; }
        .gp-summary { margin-top: 12px; font-size: 13px; color: var(--text-faint); }
        .gp-summary.abnormal { color: var(--alert); font-weight: 700; }
      `}</style>
    </Panel>
  );
}

/**
 * PhaseVectorPanel -- 실시간 3상 벡터도 (현재 vs 1시간 전 비교).
 *
 * 원격 제어(발전소 원격 제어 화면)를 실행하기 전에 계통 상태가 정상
 * 범위인지 눈으로 바로 확인할 수 있도록, 3상 전압/전류를 벡터도로
 * 그려서 "현재"와 "1시간 전"을 나란히 비교한다 (Dr. Bksolar 매뉴얼
 * 21p "3상 벡터도" 화면과 동일한 구성). 상계용/발전용/ESS전용 모두
 * 발전소 원격 제어 화면 최상단에서 확인할 수 있다.
 */
function computePhaseVectors(tick) {
  // 균형 3상: 상별 120도 위상차. 전압/전류 크기와 위상각(역률)에
  // 약간의 흔들림을 줘서 "실측값처럼" 보이게 한다.
  const vMag = (offset) => driftValue(233, tick + offset, 1.2);
  const iMag = (offset) => driftValue(135, tick + offset, 8);
  const pfAngle = driftValue(18, tick, 4); // 전류가 전압보다 늦게 도는 위상각(역률 지상)
  return {
    Va: { mag: vMag(0), angleDeg: 0 },
    Vb: { mag: vMag(1), angleDeg: 240 },
    Vc: { mag: vMag(2), angleDeg: 120 },
    Ia: { mag: iMag(0), angleDeg: 0 + pfAngle },
    Ib: { mag: iMag(1), angleDeg: 240 + pfAngle },
    Ic: { mag: iMag(2), angleDeg: 120 + pfAngle },
  };
}

function PhaseVectorSvg({ vectors, title, maxV, maxI, singlePhase }) {
  const size = 260, center = size / 2, radius = size / 2 - 30;
  const toXY = (mag, angleDeg, max) => {
    const r = (mag / max) * radius;
    const rad = (angleDeg * Math.PI) / 180;
    // 12시 방향을 0도로, 시계방향으로 회전 (전기 위상 표기 관례)
    return { x: center + r * Math.sin(rad), y: center - r * Math.cos(rad) };
  };
  const vArrows = singlePhase
    ? [{ key: "Va", color: "#4fa8ff", ...vectors.Va }]
    : [
        { key: "Va", color: "#4fa8ff", ...vectors.Va },
        { key: "Vb", color: "#4fa8ff", ...vectors.Vb },
        { key: "Vc", color: "#4fa8ff", ...vectors.Vc },
      ];
  const iArrows = singlePhase
    ? [{ key: "Ia", color: "#f2b84b", ...vectors.Ia }]
    : [
        { key: "Ia", color: "#f2b84b", ...vectors.Ia },
        { key: "Ib", color: "#f2b84b", ...vectors.Ib },
        { key: "Ic", color: "#f2b84b", ...vectors.Ic },
      ];
  return (
    <svg viewBox={"0 0 " + size + " " + size} width="100%" height="240" role="img" aria-label={title + " phasor diagram"}>
      <circle cx={center} cy={center} r={radius} fill="none" stroke="var(--hairline)" strokeWidth="1" />
      <circle cx={center} cy={center} r={radius * 0.66} fill="none" stroke="var(--hairline)" strokeWidth="1" strokeDasharray="3 4" />
      <circle cx={center} cy={center} r={radius * 0.33} fill="none" stroke="var(--hairline)" strokeWidth="1" strokeDasharray="3 4" />
      {[vArrows, iArrows].map((group, gi) =>
        group.map((v) => {
          const max = gi === 0 ? maxV : maxI;
          const { x, y } = toXY(v.mag, v.angleDeg, max);
          return (
            <g key={v.key}>
              <line x1={center} y1={center} x2={x} y2={y} stroke={v.color} strokeWidth="2" markerEnd={"url(#pv-arrow-" + v.color.replace("#", "") + ")"} />
              <text x={x + (x >= center ? 4 : -4)} y={y} textAnchor={x >= center ? "start" : "end"} fontSize="11" fill={v.color} fontFamily="var(--font-mono)">
                {v.key}({v.mag.toFixed(1)})
              </text>
            </g>
          );
        })
      )}
      <defs>
        {["4fa8ff", "f2b84b"].map((c) => (
          <marker key={c} id={"pv-arrow-" + c} markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
            <path d="M0,0 L7,3.5 L0,7 Z" fill={"#" + c} />
          </marker>
        ))}
      </defs>
      <text x={center} y={size - 8} textAnchor="middle" fontSize="12" fill="var(--text-faint)" fontFamily="var(--font-mono)">{title}</text>
    </svg>
  );
}

function PhaseVectorPanel({ usage }) {
  const tick = useRealtimeTick(2000);
  const now = computePhaseVectors(tick);
  const hourAgo = computePhaseVectors(tick - 1800); // 2초 간격 기준 1800틱 = 1시간 전 스냅샷
  const maxV = 260, maxI = 180;
  // 상계용(NET_METERING)은 실제로 단상 계통으로 연계되는 경우가 대부분이므로
  // A상 전압/전류만 표시한다 (매뉴얼 21p "단상일 경우 A상만 표시"와 동일 규칙).
  const isSinglePhase = usage === "NET_METERING";

  const rows = isSinglePhase
    ? [
        { label: "전압(Va)", now: now.Va.mag, nowAngle: now.Va.angleDeg, prev: hourAgo.Va.mag, prevAngle: hourAgo.Va.angleDeg },
        { label: "전류(Ia)", now: now.Ia.mag, nowAngle: now.Ia.angleDeg, prev: hourAgo.Ia.mag, prevAngle: hourAgo.Ia.angleDeg },
      ]
    : [
        { label: "A상전압(Va)", now: now.Va.mag, nowAngle: now.Va.angleDeg, prev: hourAgo.Va.mag, prevAngle: hourAgo.Va.angleDeg },
        { label: "B상전압(Vb)", now: now.Vb.mag, nowAngle: now.Vb.angleDeg, prev: hourAgo.Vb.mag, prevAngle: hourAgo.Vb.angleDeg },
        { label: "C상전압(Vc)", now: now.Vc.mag, nowAngle: now.Vc.angleDeg, prev: hourAgo.Vc.mag, prevAngle: hourAgo.Vc.angleDeg },
        { label: "A상전류(Ia)", now: now.Ia.mag, nowAngle: now.Ia.angleDeg, prev: hourAgo.Ia.mag, prevAngle: hourAgo.Ia.angleDeg },
        { label: "B상전류(Ib)", now: now.Ib.mag, nowAngle: now.Ib.angleDeg, prev: hourAgo.Ib.mag, prevAngle: hourAgo.Ib.angleDeg },
        { label: "C상전류(Ic)", now: now.Ic.mag, nowAngle: now.Ic.angleDeg, prev: hourAgo.Ic.mag, prevAngle: hourAgo.Ic.angleDeg },
      ];

  const panelTitle = isSinglePhase ? "실시간 단상 벡터도" : "실시간 3상 벡터도";
  const svgTitleNow = isSinglePhase ? "단상 벡터도 (현재)" : "3상 벡터도 (현재)";
  const svgTitlePrev = isSinglePhase ? "단상 벡터도 (1시간 전)" : "3상 벡터도 (1시간 전)";

  return (
    <Panel title={panelTitle} eyebrow="현재 · 1시간 전 비교 -- 원격 제어 실행 전 계통 상태 확인용">
      <div className="pv-grid">
        <PhaseVectorSvg vectors={now} title={svgTitleNow} maxV={maxV} maxI={maxI} singlePhase={isSinglePhase} />
        <PhaseVectorSvg vectors={hourAgo} title={svgTitlePrev} maxV={maxV} maxI={maxI} singlePhase={isSinglePhase} />
      </div>
      <div className="pv-table">
        <div className="pv-row pv-head mono"><span>구분</span><span>현재</span><span>현재 위상각</span><span>1h 전</span><span>1h 전 위상각</span></div>
        {rows.map((r) => (
          <div className="pv-row mono" key={r.label}>
            <span>{r.label}</span><span>{r.now.toFixed(2)}</span><span>{r.nowAngle.toFixed(2)}</span><span>{r.prev.toFixed(2)}</span><span>{r.prevAngle.toFixed(2)}</span>
          </div>
        ))}
      </div>
      <style>{`
        .pv-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .pv-table { display: flex; flex-direction: column; gap: 3px; margin-top: 14px; }
        .pv-row { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr; gap: 10px; padding: 7px 10px; font-size: 13px; border-bottom: 1px solid var(--hairline); }
        .pv-head { color: var(--text-faint); font-size: 12px; border-bottom: 2px solid var(--hairline); }
      `}</style>
    </Panel>
  );
}

/* =========================================================================
   5c) MONITORING GROUP DETAIL SCREENS
   ========================================================================= */

// Simple animated single-line-diagram style flow chart: boxes in a row
// connected by dashed lines whose offset animates with `tick`, so power
// flow direction reads intuitively at a glance regardless of the
// specific numbers. Used by SolarPage (Panel->Inverter->Grid) and
// EssPage (ESS->PCS->D/L->Grid) to show each system's real component
// chain instead of just a flat list of numbers.
function FlowDiagram({ nodes, tick }) {
  const boxW = 150, boxH = 64, gap = 60;
  const totalW = nodes.length * boxW + (nodes.length - 1) * gap;
  const dashOffset = -(tick * 6) % 24;

  return (
    <svg viewBox={"0 0 " + totalW + " 120"} width="100%" height="140" role="img" aria-label="system flow diagram">
      <style>{`
        .flow-label { fill: var(--text); font-family: var(--font-display); font-size: 14px; font-weight: 700; }
        .flow-sub { fill: var(--text-muted); font-size: 13px; font-family: var(--font-mono); }
      `}</style>
      {nodes.map((n, i) => {
        const x = i * (boxW + gap);
        return (
          <g key={i}>
            <rect x={x} y={28} width={boxW} height={boxH} rx="4" fill="var(--panel-raised)" stroke="var(--phosphor)" strokeWidth="1.5" />
            <text x={x + boxW / 2} y={28 + boxH / 2 - 6} textAnchor="middle" className="flow-label">{n.label}</text>
            {n.sub && <text x={x + boxW / 2} y={28 + boxH / 2 + 16} textAnchor="middle" className="flow-sub">{n.sub}</text>}
            {i < nodes.length - 1 && (
              <line
                x1={x + boxW} y1={28 + boxH / 2}
                x2={x + boxW + gap} y2={28 + boxH / 2}
                stroke="var(--phosphor)" strokeWidth="2.5"
                strokeDasharray="5 9"
                strokeDashoffset={dashOffset}
                markerEnd="url(#arrowhead)"
              />
            )}
          </g>
        );
      })}
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="var(--phosphor)" />
        </marker>
      </defs>
    </svg>
  );
}

// Groups detail metrics by which diagram stage they belong to, and
// lays them out left-to-right in the SAME order as the FlowDiagram
// above it -- so "패널 DC전압/모듈전류 -> 인버터 발전출력 -> 계량기/
// 배전반 상태" reads as one continuous sequence matching the diagram,
// instead of a flat unordered grid of numbers.
function StageDetailRow({ stages }) {
  return (
    <div className="stage-row">
      {stages.map((s, i) => (
        <div className="stage-card" key={i}>
          <div className="stage-card-title mono">{s.stageLabel}</div>
          {s.metrics.map((m) => (
            <div className="stage-metric" key={m.label}>
              <span className="stage-metric-label mono">{m.label}</span>
              <span className="stage-metric-value">
                <span className="mono">{m.value}</span>
                {m.unit && <span className="stage-metric-unit mono">{m.unit}</span>}
              </span>
            </div>
          ))}
        </div>
      ))}
      <style>{`
        .stage-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .stage-card { flex: 1; min-width: 140px; border: 1px solid var(--hairline); border-top: 3px solid var(--phosphor); border-radius: var(--radius); padding: 12px; background: var(--panel-raised); }
        .stage-card-title { font-size: 13px; color: var(--phosphor); font-weight: 700; margin-bottom: 8px; }
        .stage-metric { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-top: 1px solid var(--hairline); }
        .stage-metric:first-of-type { border-top: none; }
        .stage-metric-label { font-size: 12px; color: var(--text-faint); }
        .stage-metric-value { font-size: 16px; font-weight: 700; color: var(--text); }
        .stage-metric-unit { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-left: 3px; }
      `}</style>
    </div>
  );
}

function SolarPage() {
  const tick = useRealtimeTick(2000);
  const outputKw = driftValue(3120, tick, 180);
  const dcVoltage = driftValue(812, tick, 8);
  const moduleCurrent = driftValue(24.6, tick, 1.2);

  // 4-stage chain: 태양광 패널 -> 인버터 -> 양방향계량기/배전반 -> D/L
  const diagramNodes = [
    { label: "태양광 패널", sub: "모듈 어레이" },
    { label: "인버터", sub: outputKw.toFixed(0) + " kW" },
    { label: "양방향계량기/배전반", sub: "정상" },
    { label: "D/L", sub: "배전선로" },
  ];

  const stages = [
    { stageLabel: "태양광 패널", metrics: [
      { label: "DC 전압", value: dcVoltage.toFixed(0), unit: "V" },
      { label: "모듈 전류", value: moduleCurrent.toFixed(1), unit: "A" },
    ] },
    { stageLabel: "인버터", metrics: [
      { label: "발전 출력", value: outputKw.toFixed(0), unit: "kW" },
    ] },
    { stageLabel: "양방향계량기/배전반", metrics: [
      { label: "배전반 상태", value: "정상", unit: "" },
    ] },
    { stageLabel: "D/L", metrics: [
      { label: "선로 상태", value: "정상", unit: "" },
    ] },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Panel title="태양광 시스템 구성도" eyebrow="\uD328\uB110 \u2192 \uC778\uBC84\uD130 \u2192 \uC591\uBC29\uD5A5\uACC4\uB7C9\uAE30/\uBC30\uC804\uBC18 \u2192 D/L">
        <FlowDiagram nodes={diagramNodes} tick={tick} />
        <div style={{ marginTop: 18 }}>
          <StageDetailRow stages={stages} />
        </div>
      </Panel>
      <GridProtectionPanel systemLabel="태양광" deviceName="태양광 인버터" />
    </div>
  );
}

function EssPage() {
  const tick = useRealtimeTick(2000);
  const soc = driftValue(62, tick, 3);
  const soh = driftValue(97.8, tick, 0.3);
  const cellTemp = driftValue(31.2, tick, 1.2);
  const flowKw = driftValue(420, tick, 60);
  const isDischarging = flowKw >= 0;
  // 하이브리드 PV+ESS 구성: 태양광 패널 -> (충전측 PCS) -> ESS PACK ->
  // (방전측 PCS) -> 계량기/배전반 -> D/L. 발전용(SolarPage: 패널->인버터->
  // 양방향계량기/배전반->D/L)과는 구조 자체가 다르므로, 같은 FlowDiagram
  // 컴포넌트를 재사용하더라도 노드 구성과 단계별 지표는 ESS 전용으로
  // 완전히 별도 정의한다.
  const pvOutputKw = Math.max(0, driftValue(150, tick, 45));
  const pvIrradiance = Math.max(0, driftValue(620, tick, 120));
  // 상계용/ESS전용 구성에서는 태양광 패널(어레이)의 출력이 PCS(충전측)로
  // 바로 들어가는 DC 전력이다 (계통에 바로 나가는 AC가 아님 -- AC 변환은
  // 방전측 PCS 이후에 일어난다). 그동안 "kW"로만 표기되어 있어 이 지점이
  // DC인지 AC인지 화면만으로는 구분이 안 됐으므로, 여기서부터 명시적으로
  // "DC"임을 표기한다 (kWdc 단위 표기 + DC 전압 지표 추가).
  const pvDcVoltage = driftValue(780, tick, 15);

  // 6-stage chain: 태양광 패널 -> PCS(충전) -> ESS PACK -> PCS(방전) -> 계량기/배전반 -> D/L
  const diagramNodes = [
    { label: "태양광 패널", sub: "PV \uC5B4\uB808\uC774(DC) \u00b7 " + pvOutputKw.toFixed(0) + " kWdc" },
    { label: "PCS", sub: "충전측 \u00b7 " + (isDischarging ? "대기" : "충전 중") },
    { label: "ESS PACK", sub: "배터리팩 \u00b7 " + soc.toFixed(0) + "%" },
    { label: "PCS", sub: "방전측 \u00b7 " + (isDischarging ? "방전 중" : "대기") },
    { label: "계량기/배전반", sub: (isDischarging ? "\u2192 " : "\u2190 ") + Math.abs(flowKw).toFixed(0) + " kW" },
    { label: "D/L", sub: "배전선로" },
  ];

  const stages = [
    { stageLabel: "태양광 패널 (DC 출력)", metrics: [
      { label: "일사량", value: pvIrradiance.toFixed(0), unit: "W/m\u00b2" },
      { label: "DC 전압", value: pvDcVoltage.toFixed(0), unit: "V" },
      { label: "PV 출력 (DC)", value: pvOutputKw.toFixed(1), unit: "kWdc" },
    ] },
    { stageLabel: "PCS", metrics: [
      { label: "충전측 상태", value: isDischarging ? "대기" : "충전 중", unit: "" },
    ] },
    { stageLabel: "ESS PACK", metrics: [
      { label: "SOC (충전 상태)", value: soc.toFixed(1), unit: "%" },
      { label: "SOH (건강도)", value: soh.toFixed(1), unit: "%" },
      { label: "최대 셀 온도", value: cellTemp.toFixed(1), unit: "\u00b0C" },
    ] },
    { stageLabel: "PCS", metrics: [
      { label: "방전측 상태", value: isDischarging ? "방전 중" : "대기", unit: "" },
    ] },
    { stageLabel: "계량기/배전반", metrics: [
      { label: "계량 방향", value: isDischarging ? "매도(수출)" : "매입(수입)", unit: "" },
    ] },
    { stageLabel: "D/L", metrics: [
      { label: "선로 상태", value: "정상", unit: "" },
    ] },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Panel
        title="ESS 시스템 구성도"
        eyebrow="태양광 패널 \u2192 PCS(충전) \u2192 ESS PACK \u2192 PCS(방전) \u2192 계량기/배전반 \u2192 D/L"
        action={<a className="mono" href={"#" + window.location.hash.replace(/\/[^/]+\/[^/]+$/, "/twin")} style={{ fontSize: 14, color: "var(--phosphor)" }}>3D 트윈 보기 \u2192</a>}
      >
        <FlowDiagram nodes={diagramNodes} tick={tick} />
        <div style={{ marginTop: 18 }}>
          <StageDetailRow stages={stages} />
        </div>
      </Panel>
      <GridProtectionPanel systemLabel="ESS" deviceName="ESS PCS" />
    </div>
  );
}
